// ================================================================
function checkCollisions(){
  if(!pBalls.length) return;
  // ↓新增：旋刃横扫免伤——碰撞伤害被跳过
  const spinShield = atkState.spin.shield;
  // ↓新增：无敌道具保护
  const isInvincible = invincibleActive;

  for(let i=roadBalls.length-1;i>=0;i--){
    const rb=roadBalls[i];
    if(rb.collected) continue;
    const rbScreenZ=worldOffset-rb.wOff;
    // ↓修改：磁力激活时增大碰撞检测范围
    const hitRange = magnetActive ? MAGNET_RANGE * 0.5 : 12;
    if(Math.abs(rbScreenZ)>hitRange) continue;
    let hit=false;
    for(const pb of pBalls){
      if(pb.mesh.position.distanceTo(rb.mesh.position)<radius(pb.lvl)+radius(rb.lvl)+0.3){hit=true;break;}
    }
    if(hit){
      rb.collected=true;
      emit(rb.mesh.position,LEVELS[rb.lvl-1].h,30);
      const lead=getLeadPos();
      rb.mesh.userData.flyTo=lead.clone().add(new THREE.Vector3((Math.random()-0.5)*4,0,0));
      const capLvl=rb.lvl,capMesh=rb.mesh,capGlow=rb.glow;
      setTimeout(()=>{
        scene.remove(capMesh);scene.remove(capGlow);
        const ri=roadBalls.indexOf(rb);if(ri>=0)roadBalls.splice(ri,1);
        addPlayerBall(capLvl);addScore(capLvl*10);
        gainEnergy(CFG.energyGainCollect);  // ↓新增：捡球获取能量
        const fc=doFusion();showCombo(fc);updateFusionHUD();
        if(fc>0){doShake(0.25,0.3); gainEnergy(CFG.energyGainFusion);}  // ↓新增：合成获取能量
      },350);
      break;
    }
  }
  roadBalls.forEach(rb=>{
    if(rb.mesh.userData.flyTo){
      rb.mesh.position.lerp(rb.mesh.userData.flyTo,0.2);
      rb.glow.position.x=rb.mesh.position.x;rb.glow.position.z=rb.mesh.position.z;
    }
  });
  for(let i=blackBalls.length-1;i>=0;i--){
    const ob=blackBalls[i];
    if(ob.destroyed)continue;
    const obScreenZ=worldOffset-ob.wOff;
    if(Math.abs(obScreenZ)>8)continue;
    // ↓新增：旋刃免伤跳过碰撞伤害
    if(spinShield) continue;
    // ↓新增：无敌状态跳过伤害
    if(isInvincible) continue;
    const et = CFG.enemyTypes[ob.enemyType || 0];
    for(let j=pBalls.length-1;j>=0;j--){
      const pb=pBalls[j];
      if(pb.mesh.position.distanceTo(ob.mesh.position)<radius(pb.lvl)+et.radius){
        emit(pb.mesh.position,LEVELS[pb.lvl-1].h,45,'break');
        scene.remove(pb.mesh);pBalls.splice(j,1);refreshLead();updateFusionHUD();
        if(!damageEnemy(ob, 'contact', 1)){
          // 怪物没死，但还是移除球
        } else {
          blackBalls.splice(i,1);
        }
        doShake(0.45,0.4);break;
      }
    }
  }
  if(pBalls.length===0)addPlayerBall(1);
}

const BULLET_MODES = [
  {lvl:1,count:1,spread:0,pierce:false,dmg:1,color:0x00ffff,ec:0x00ffff,label:'普通'},
  {lvl:2,count:1,spread:0,pierce:false,dmg:1,color:0x00ffff,ec:0x00ffff,label:'普通'},
  {lvl:3,count:2,spread:0.1,pierce:false,dmg:1,color:0x00ff88,ec:0x00ff88,label:'双发'},
  {lvl:4,count:3,spread:0.2,pierce:false,dmg:2,color:0xffcc00,ec:0xffcc00,label:'扩散'},
  {lvl:5,count:3,spread:0.2,pierce:true,dmg:2,color:0xff8800,ec:0xff4400,label:'穿透'},
  {lvl:6,count:5,spread:0.35,pierce:true,dmg:3,color:0xff3300,ec:0xff0000,label:'爆裂'},
  {lvl:7,count:7,spread:0.45,pierce:true,dmg:4,color:0xff00ff,ec:0xcc00ff,label:'全爆'},
];

function getBulletMode(){
  const ml=maxLvl();
  return BULLET_MODES[Math.min(ml,BULLET_MODES.length)-1];
}

const bullets = [];
let shootCooldown=0;
let chargeTime=0;
const MAX_CHARGE=0.6;
let shootPressed=false;
let lastShotTime=0;

const bulletMatCache={};
function getBulletMat(color,ec){
  const key=`${color}_${ec}`;
  if(!bulletMatCache[key]){
    bulletMatCache[key]=new THREE.MeshStandardMaterial({
      color,emissive:ec,emissiveIntensity:5.0,
      roughness:0,metalness:1,transparent:true,opacity:0.92,
    });
  }
  return bulletMatCache[key];
}

function fireBullet(charged){
  if(!pBalls.length)return;
  const mode=getBulletMode();
  const lead=getLeadBall();
  const basePos=lead.mesh.position.clone();
  basePos.y+=radius(lead.lvl)*0.6;
  const speedMul=charged?1.4:1.0;
  const sizeMul=charged?1.6:1.0;
  const cnt=charged?Math.min(mode.count+2,9):mode.count;
  for(let k=0;k<cnt;k++){
    const angle=(k-(cnt-1)/2)*mode.spread;
    const bMesh=new THREE.Mesh(new THREE.SphereGeometry(CFG.bulletRadius*sizeMul,10,10),getBulletMat(mode.color,mode.ec));
    bMesh.position.copy(basePos);scene.add(bMesh);
    const trail=new THREE.Mesh(new THREE.SphereGeometry(CFG.bulletRadius*sizeMul*2.2,8,8),new THREE.MeshBasicMaterial({color:mode.ec,transparent:true,opacity:0.22}));
    bMesh.add(trail);
    if(k===Math.floor(cnt/2)){const bLight=new THREE.PointLight(mode.ec,1.5,8);bMesh.add(bLight);}
    bullets.push({mesh:bMesh,vx:Math.sin(angle)*CFG.bulletSpeedPS*speedMul,vz:-Math.cos(angle)*CFG.bulletSpeedPS*speedMul,age:0,pierce:mode.pierce,dmg:mode.dmg*(charged?2:1)});
  }
  shootCooldown=CFG.shootCooldown*(mode.count<=2?1.0:0.7);
  lastShotTime=Date.now();
  if(charged&&cnt>=5){emit(basePos,`#${mode.ec.toString(16).padStart(6,'0')}`,25,'fusion');doShake(0.15,0.15);}
  else{emit(basePos,`#${mode.ec.toString(16).padStart(6,'0')}`,6+mode.count*2);}
}

function updateBullets(dt){
  if(ctl.shoot){
    if(!shootPressed){shootPressed=true;chargeTime=0;}
    chargeTime+=dt;
    if(chargeTime>=MAX_CHARGE&&shootCooldown<=0){fireBullet(true);chargeTime=0;shootPressed=false;}
  } else {
    if(shootPressed){if(shootCooldown<=0)fireBullet(chargeTime>0.15);shootPressed=false;chargeTime=0;}
  }
  if(shootCooldown>0)shootCooldown-=dt;
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.age+=dt;b.mesh.position.x+=b.vx*dt;b.mesh.position.z+=b.vz*dt;
    b.mesh.rotation.y+=dt*8;
    if(b.age>CFG.bulletLife){scene.remove(b.mesh);bullets.splice(i,1);continue;}
    let hitBlack=false;
    for(let j=blackBalls.length-1;j>=0;j--){
      const ob=blackBalls[j];
      if(ob.destroyed)continue;
      const et = CFG.enemyTypes[ob.enemyType || 0];
      if(b.mesh.position.distanceTo(ob.mesh.position)<CFG.bulletRadius*1.5+et.radius){
        // ↓修改：使用属性伤害系统
        const killed = damageEnemy(ob, 'bullet', b.dmg);
        if(killed) blackBalls.splice(j,1);  // 已在damageEnemy中remove mesh
        if(!b.pierce){scene.remove(b.mesh);bullets.splice(i,1);hitBlack=true;}
        break;
      }
    }
    if(hitBlack)continue;
    for(let j=traps.length-1;j>=0;j--){
      const tr=traps[j];
      if(tr.destroyed||tr.type!=='bar')continue;
      if(b.mesh.position.distanceTo(tr.mesh.position)<3.5){
        emit(tr.mesh.position,'#ff6600',20,'break');
        scene.remove(tr.mesh);scene.remove(tr.glow);tr.destroyed=true;traps.splice(j,1);gs.score+=30;
        gainEnergy(CFG.energyGainDestroy);  // ↓新增：射击清陷阱获取能量
        if(!b.pierce){scene.remove(b.mesh);bullets.splice(i,1);hitBlack=true;}
        break;
      }
    }
    if(hitBlack)continue;
    if(b.mesh.position.z<-120||b.mesh.position.z>20){scene.remove(b.mesh);bullets.splice(i,1);}
  }
}

function drawChargeBar(){
  if(!ctl.shoot||chargeTime<=0)return;
  const ratio=Math.min(chargeTime/MAX_CHARGE,1);
  const mode=getBulletMode();
  const col=ratio>0.8?'#ff3300':ratio>0.4?'#ffcc00':'#00ffff';
  const barW=120,barH=8;
  const cx=cvs2.width/2,cy=cvs2.height-55;
  ctx.save();
  ctx.globalAlpha=0.85;
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.beginPath();ctx.roundRect(cx-barW/2-4,cy-4,barW+8,barH+8,4);ctx.fill();
  ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=ratio>0.5?16:0;
  ctx.beginPath();ctx.roundRect(cx-barW/2,cy,barW*ratio,barH,3);ctx.fill();
  if(ratio>=1){ctx.font='700 11px Arial';ctx.textAlign='center';ctx.fillStyle='#fff';ctx.fillText('CHARGED!',cx,cy-6);}
  ctx.restore();
}

// ↓新增：磁力吸附视觉效果
function drawMagnetEffect(){
  if(!magnetActive) return;
  const lead = getLeadBall();
  if(!lead) return;
  const pos = lead.mesh.position.clone();
  pos.project(camera);
  const sx = (pos.x + 1) / 2 * cvs2.width;
  const sy = (-pos.y + 1) / 2 * cvs2.height;

  ctx.save();
  // 磁力范围圆
  const pulse = 0.6 + 0.3 * Math.sin(Date.now() * 0.008);
  ctx.strokeStyle = `rgba(0,200,255,${0.15 * pulse})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(sx, sy, 120 * pulse, 0, Math.PI * 2);
  ctx.stroke();
  // 内圈
  ctx.strokeStyle = `rgba(0,200,255,${0.3 * pulse})`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(sx, sy, 60 * pulse, 0, Math.PI * 2);
  ctx.stroke();
  // 放射线
  const rayCount = 8;
  for(let r = 0; r < rayCount; r++){
    const angle = (r / rayCount) * Math.PI * 2 + Date.now() * 0.002;
    const innerR = 30;
    const outerR = 100 + 20 * Math.sin(Date.now() * 0.005 + r);
    ctx.strokeStyle = `rgba(0,200,255,${0.1 * pulse})`;
    ctx.beginPath();
    ctx.moveTo(sx + Math.cos(angle) * innerR, sy + Math.sin(angle) * innerR);
    ctx.lineTo(sx + Math.cos(angle) * outerR, sy + Math.sin(angle) * outerR);
    ctx.stroke();
  }
  ctx.restore();
}

// ================================================================
//  能量系统 ↓新增

const energy = { val: 0 };   // 0 ~ CFG.maxEnergy

/** 增加能量（合成/捡球/清障） */
function gainEnergy(amount){
  energy.val = Math.min(CFG.maxEnergy, energy.val + amount);
  updateEnergyHUD();
}

/** 消耗能量，返回是否成功 */
function spendEnergy(amount){
  if(energy.val < amount) return false;
  energy.val -= amount;
  updateEnergyHUD();
  return true;
}

/** 更新能量条HUD */
function updateEnergyHUD(){
  const fill = document.getElementById('energy-bar-fill');
  const val  = document.getElementById('energy-val');
  if(!fill || !val) return;
  const pct = (energy.val / CFG.maxEnergy * 100).toFixed(1);
  fill.style.width = pct + '%';
  val.textContent = Math.floor(energy.val);
  // 满能量彩虹动画
  if(energy.val >= CFG.maxEnergy) fill.classList.add('full');
  else fill.classList.remove('full');
  // 爆震按钮状态
  const blastSlot = document.getElementById('atk-blast');
  if(blastSlot){
    if(energy.val >= CFG.atkBlastCost) blastSlot.classList.add('ready');
    else blastSlot.classList.remove('ready');
  }
}

/** 对怪物造成伤害，返回是否被击杀 */
function damageEnemy(enemy, attackType, dmg){
  if(!enemy || enemy.destroyed) return false;
  const et = CFG.enemyTypes[enemy.enemyType || 0];

  // 判断是否克制
  const isWeak = (et.weakTo === 'any') || (et.weakTo === attackType);
  const finalDmg = isWeak ? dmg * CFG.enemyWeakDmgMul : dmg * CFG.enemyShieldDmgMul;

  enemy.hp -= finalDmg;

  // 受击视觉反馈
  if(isWeak){
    // 克制：高亮闪烁 + 大粒子
    emit(enemy.mesh.position, `#${et.ring.toString(16).padStart(6,'0')}`, 25, 'fusion');
    doShake(0.15, 0.15);
    showAtkMsg(`💥 克制! ${et.name}`, `#${et.ring.toString(16).padStart(6,'0')}`);
  } else {
    // 非克制：护盾弹开效果
    emit(enemy.mesh.position, '#666666', 10, 'hit');
    showAtkMsg(`🛡 护盾抵抗!`, '#888888');
  }

  // 护盾破碎视觉（HP降低时护盾闪烁）
  if(enemy.shield && enemy.mesh){
    enemy.mesh.children.forEach(child => {
      if(child.material && child.material.wireframe){
        child.material.opacity = Math.max(0.03, 0.12 * (enemy.hp / enemy.maxHp));
      }
    });
  }

  // 击杀判定
  if(enemy.hp <= 0){
    enemy.destroyed = true;
    emit(enemy.mesh.position, `#${et.ring.toString(16).padStart(6,'0')}`, isWeak ? 60 : 30, 'fusion');
    scene.remove(enemy.mesh); scene.remove(enemy.glow);
    gs.score += et.score;  // 保持兼容（怪物得分不受双倍影响，以免太多）
    gainEnergy(isWeak ? CFG.energyGainDestroy * 2 : CFG.energyGainDestroy);
    doShake(isWeak ? 0.3 : 0.15, isWeak ? 0.3 : 0.15);
    return true;
  }
  return false;
}

// ── 礼花粒子系统 ──
const fwCanvas = document.getElementById('fireworks-canvas');
let fwCtx = null;
const fwParticles = [];
let fwAnimId = null;

function initFireworks(){
  fwCanvas.width = innerWidth;
  fwCanvas.height = innerHeight;
  fwCtx = fwCanvas.getContext('2d');
  window.addEventListener('resize',()=>{
    fwCanvas.width = innerWidth;
    fwCanvas.height = innerHeight;
  });
}

function launchFirework(x, y, color){
  const count = 60 + Math.floor(Math.random()*40);
  for(let i=0;i<count;i++){
    const angle = Math.random()*Math.PI*2;
    const speed = 2 + Math.random()*6;
    fwParticles.push({
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed,
      life: 1.0,
      decay: 0.012 + Math.random()*0.018,
      radius: 3 + Math.random()*3,
      color,
      grav: 0.08 + Math.random()*0.05,
    });
  }
}

function autoFireworks(){
  if(!fwCanvas.classList.contains('show')) return;
  const colors = ['#FFD700','#FF4444','#00FF88','#00AAFF','#FF88AA','#FFAA00','#AA44FF'];
  launchFirework(Math.random()*innerWidth, Math.random()*innerHeight*0.6, colors[Math.floor(Math.random()*colors.length)]);
  if(fwAnimId !== null) setTimeout(autoFireworks, 400 + Math.random()*600);
}

function tickFireworks(){
  if(!fwCtx) return;
  fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
  for(let i=fwParticles.length-1;i>=0;i--){
    const p = fwParticles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += p.grav;
    p.vx *= 0.98; p.vy *= 0.98;
    p.life -= p.decay;
    if(p.life <= 0){ fwParticles.splice(i,1); continue; }
    fwCtx.save();
    fwCtx.globalAlpha = Math.max(0, p.life);
    fwCtx.shadowColor = p.color; fwCtx.shadowBlur = 8;
    fwCtx.fillStyle = p.color;
    fwCtx.beginPath();
    fwCtx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI*2);
    fwCtx.fill();
    fwCtx.restore();
  }
  fwAnimId = requestAnimationFrame(tickFireworks);
}

function startFireworks(){
  fwCanvas.classList.add('show');
  if(fwAnimId === null){
    fwAnimId = requestAnimationFrame(tickFireworks);
    autoFireworks();
  }
}

function stopFireworks(){
  fwCanvas.classList.remove('show');
  if(fwAnimId !== null){ cancelAnimationFrame(fwAnimId); fwAnimId = null; }
  fwParticles.length = 0;
  if(fwCtx) fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
}

// ── 胜利检测 ──
function checkVictory(){
  if(stageState.cleared) return;
  const stg = getCurrentStage();

  if(stg.targetCount && stg.targetCount > 1){
    // 多球目标：同时拥有N个目标等级球
    const cnt = pBalls.filter(b => b.lvl === stg.targetLvl).length;
    if(cnt >= stg.targetCount) triggerVictory();
  } else {
    // 普通目标：拥有一个目标等级球
    if(pBalls.some(b => b.lvl === stg.targetLvl)) triggerVictory();
  }
}

function triggerVictory(){
  if(stageState.cleared) return;
  stageState.cleared = true;

  const stg = getCurrentStage();
  const victoryScreen = document.getElementById('victory-screen');
  const isLastLevel = stageState.current >= STAGE_CONFIGS.length;

  // 填充胜利信息
  const goalBallColor = LEVELS[stg.targetLvl - 1].h;
  document.getElementById('victory-title').textContent = isLastLevel ? '🏆 全关通关!' : 'LEVEL CLEAR!';
  document.getElementById('victory-subtitle').textContent = `第 ${stg.stage} 关 — ${stg.name}`;
  document.getElementById('victory-info').innerHTML =
    `合成目标：<span class="vball" style="background:${goalBallColor};color:${goalBallColor};box-shadow:0 0 14px ${goalBallColor}"></span>`+
    `<strong style="color:${goalBallColor}">${stg.targetName}</strong> ✓<br>`+
    `得分：<strong style="color:#FFD700">${gs.score}</strong> &nbsp; 距离：<strong style="color:#00d4ff">${Math.floor(gs.distance)}</strong>m`;

  // 控制按钮状态
  const nextBtn = document.getElementById('btn-next-level');
  if(isLastLevel){
    nextBtn.textContent = '🏠 返回主菜单';
    nextBtn.onclick = () => { stopFireworks(); showStartUI(); };
  } else {
    nextBtn.textContent = `▶  进入第 ${stg.stage + 1} 关`;
    nextBtn.onclick = () => { stopFireworks(); loadNextLevel(); };
  }

  document.getElementById('btn-restart-level').onclick = () => {
    stopFireworks(); restartCurrentLevel();
  };

  // 短暂延迟后显示界面
  setTimeout(()=>{
    victoryScreen.classList.add('show');
    startFireworks();
    doShake(0.5, 0.6);
  }, 600);
}

// ── 加载下一关 ──
function loadNextLevel(){
  if(stageState.current >= STAGE_CONFIGS.length) return;
  stageState.current++;
  stageState.cleared = false;
  document.getElementById('victory-screen').classList.remove('show');
  applyStageConfig();
  resetLevelState();
}

// ── 重新开始当前关 ──
function restartCurrentLevel(){
  stageState.cleared = false;
  document.getElementById('victory-screen').classList.remove('show');
  applyStageConfig();
  resetLevelState();
}

// ── 应用关卡配置（天空盒/雾气/轨道宽度/速度/障碍参数）──
function applyStageConfig(){
  const stg = getCurrentStage();
  setSkyColors(stg.sky.colors, stg.sky.stops, stg.fogColor, stg.ambientColor, stg.moonColor);

  // 动态轨道宽度
  const targetW = stg.trackWidth || 62;
  CFG.trackWidth = targetW;

  // 速度参数（基于关卡倍率）
  const mul = stg.speedMul || 1.0;
  const dc = DIFF_CONFIG[currentDiff] || DIFF_CONFIG['normal'];
  const stageProgress = (stg.stage - 1) / Math.max(1, STAGE_CONFIGS.length - 1);
  CFG.initSpeedPS = dc.initSpeedPS * (0.98 + stageProgress * 0.14) * (0.94 + mul * 0.08);
  CFG.maxSpeedPS  = Math.max(13, (dc.maxSpeedPS || 22) * (0.9 + stageProgress * 0.28) * (0.9 + mul * 0.08));
  CFG.speedRiseK  = dc.speedRiseK * (0.9 + stageProgress * 0.18);
  CFG.speedMidSpeed = CFG.initSpeedPS + (CFG.maxSpeedPS - CFG.initSpeedPS) * 0.38;

  // 障碍密度
  const dens = stg.obstacleDensity != null ? stg.obstacleDensity : 1.0;
  CFG.obstacleMul = Math.max(0, dens * (dc.obstacleMul || 1.0));

  // 路边球密度
  const rbMul = stg.roadBallMul || 1.0;
  CFG.roadBallInterval = Math.max(18, 14 / Math.max(0.05, rbMul * CFG.roadBallDensity));

  // 更新HUD关卡信息
  updateLevelHUD();

  // 重置无敌距离计数器
  lastInvincibleDist = gs.distance + 100;

  // 启动关卡特殊功能
  activateSpecialFeature(stg);

  // 双倍分数提示
  if(stg.doubleScore){
    setTimeout(()=>showAtkMsg('🌟 双倍分数已激活！', '#FFD700'), 500);
  }
}

// ── 重置关卡内状态（球、障碍）──
function resetLevelState(){
  // 清除场景中所有球、障碍物等
  pBalls.forEach(b => scene.remove(b.mesh));
  pBalls.length = 0;
  roadBalls.forEach(b => { scene.remove(b.mesh); scene.remove(b.glow); });
  roadBalls.length = 0;
  blackBalls.forEach(b => { scene.remove(b.mesh); scene.remove(b.glow); });
  blackBalls.length = 0;
  traps.forEach(t => { scene.remove(t.mesh); scene.remove(t.glow); });
  traps.length = 0;
  invincibleItems.forEach(m => scene.remove(m.group));
  invincibleItems.length = 0;
  specialPads.forEach(p => scene.remove(p.mesh));
  specialPads.length = 0;
  invincibleActive = false; invincibleTimer = 0;
  magnetActive = false; magnetTimer = 0;
  magnetItems.forEach(m => scene.remove(m.group));
  magnetItems.length = 0;
  // 重置计数器（保留距离和分数，只重置关卡内障碍）
  lastObsDist = gs.distance;
  lastRbDist = gs.distance;
  lastTrapDist = gs.distance + 80;
  lastMagnetDist = gs.distance + 100;
  lastBridgeDist = gs.distance + 120;
  lastPadDist = gs.distance + 70;
  stageState.speedTime = 0;
  stageState.targetSpeedPS = CFG.initSpeedPS;
  gs.currentSpeedPS = CFG.initSpeedPS;
  lastPhase = 0;
  // 重置能量
  energy.val = 0; updateEnergyHUD();
  // 重新添加初始球
  addPlayerBall(1); addPlayerBall(1); addPlayerBall(1);
  for(let i=0;i<getInitialRoadBallCount();i++) spawnRoadBall();
  updateFusionHUD();
}

// ── 新手教程系统（第1关）──
const tutorial = {
  active: false,
  steps: [],
  stepIdx: 0,
  shownDists: new Set(),
};

function startTutorial(steps){
  tutorial.active = true;
  tutorial.steps  = steps;
  tutorial.stepIdx = 0;
  tutorial.shownDists = new Set();
}

function stopTutorial(){
  tutorial.active = false;
  hideTutorialBubble();
}

function showTutorialBubble(step){
  let el = document.getElementById('tutorial-bubble');
  if(!el){
    el = document.createElement('div');
    el.id = 'tutorial-bubble';
    el.style.cssText = [
      'position:fixed','bottom:180px','left:50%','transform:translateX(-50%)',
      'z-index:700','max-width:360px','padding:18px 24px',
      'background:rgba(5,12,30,0.92)','backdrop-filter:blur(14px)',
      'border:1px solid rgba(0,212,255,0.45)','border-radius:16px',
      'color:#e8f4ff','font-size:15px','line-height:1.7','text-align:center',
      'box-shadow:0 4px 40px rgba(0,180,255,0.25),inset 0 1px 0 rgba(255,255,255,0.06)',
      'white-space:pre-line','transition:opacity 0.4s',
    ].join(';');
    document.body.appendChild(el);
  }
  el.innerHTML = `<div style="font-size:28px;margin-bottom:8px">${step.icon}</div>`
               + `<div>${step.text}</div>`
               + `<div style="margin-top:12px;font-size:11px;color:rgba(0,212,255,0.5);letter-spacing:2px">继续前进以关闭</div>`;
  el.style.opacity = '1';
  el.style.display = 'block';
}

function hideTutorialBubble(){
  const el = document.getElementById('tutorial-bubble');
  if(el){ el.style.opacity = '0'; setTimeout(()=>{ if(el) el.style.display='none'; }, 400); }
}

function updateTutorial(){
  if(!tutorial.active) return;
  const stg = getCurrentStage();
  if(!stg.tutorialSteps) return;
  const steps = stg.tutorialSteps;
  // 按距离触发
  for(let i=0; i<steps.length; i++){
    const s = steps[i];
    if(!tutorial.shownDists.has(i) && gs.distance >= s.dist){
      tutorial.shownDists.add(i);
      showTutorialBubble(s);
      // 3.5秒后自动隐藏
      setTimeout(hideTutorialBubble, 3500);
    }
  }
}

// ── 双倍分数区域（第5关+）──
const doubleScoreState = { active: false };

// ── 暗区系统（第7关）──
const darkZoneState = { active: false, timer: 0, interval: 12, duration: 4 };

function updateDarkZone(dt){
  if(!darkZoneState.active) return;
  darkZoneState.timer += dt;
  const cycle = darkZoneState.interval + darkZoneState.duration;
  const phase = darkZoneState.timer % cycle;
  const inDark = phase > darkZoneState.interval;
  const overlay = document.getElementById('dark-zone-overlay');
  if(!overlay) return;
  if(inDark){
    const fade = Math.min(1, (phase - darkZoneState.interval) / 0.8);
    overlay.style.opacity = (0.88 * fade).toFixed(2);
    overlay.style.display = 'block';
    // 黑暗中只有球的光晕可见
    pBalls.forEach(b=>{
      if(b.mesh.material) b.mesh.material.emissiveIntensity = 3.5;
    });
  } else {
    const elapsed = phase;
    const fadeOut = Math.max(0, 1 - (elapsed / 0.6));
    if(fadeOut <= 0){ overlay.style.display = 'none'; }
    else overlay.style.opacity = (0.88 * fadeOut).toFixed(2);
    pBalls.forEach(b=>{
      if(b.mesh.material) b.mesh.material.emissiveIntensity = 0.55;
    });
  }
}

// ── 熔岩地板（第9关）──
const lavaFloorState = { active: false, timer: 0, interval: 8, duration: 3, warned: false };
let lavaFloorDamageTimer = 0;

function updateLavaFloor(dt){
  if(!lavaFloorState.active) return;
  lavaFloorState.timer += dt;
  const cycle = lavaFloorState.interval + lavaFloorState.duration;
  const phase = lavaFloorState.timer % cycle;
  const inLava = phase > lavaFloorState.interval;

  const overlay = document.getElementById('lava-overlay');
  if(!overlay) return;

  if(inLava){
    const fade = Math.min(1, (phase - lavaFloorState.interval) / 1.0);
    overlay.style.opacity = (0.55 * fade).toFixed(2);
    overlay.style.display = 'block';
    // 警告提示
    if(!lavaFloorState.warned){
      lavaFloorState.warned = true;
      showAtkMsg('🔥 熔岩地板！快跳起来！', '#FF4400');
    }
    // 在地面上的球受到周期伤害
    if(physics.onGround && !invincibleActive){
      lavaFloorDamageTimer += dt;
      if(lavaFloorDamageTimer >= 0.8){
        lavaFloorDamageTimer = 0;
        // 移除最后一个球（烫伤惩罚）
        if(pBalls.length > 1){
          const last = pBalls.pop();
          scene.remove(last.mesh);
          emit(last.mesh.position, '#FF4400', 20, 'hit');
          doShake(0.2, 0.25);
          showAtkMsg('💔 被熔岩灼伤！', '#FF4400');
          updateFusionHUD();
        }
      }
    }
  } else {
    lavaFloorState.warned = false;
    lavaFloorDamageTimer = 0;
    const elapsed = phase;
    const fadeOut = Math.max(0, 1 - (elapsed / 0.5));
    if(fadeOut <= 0) overlay.style.display = 'none';
    else overlay.style.opacity = (0.55 * fadeOut).toFixed(2);
  }
}

// ── 弹跳垫/加速板（第6关+）──
const specialPads = [];
let lastPadDist = 0;

function spawnBouncePad(isSpeed){
  const stg = getCurrentStage();
  const hw = (stg.trackWidth || 62) / 2;
  const xPos = (Math.random() - 0.5) * (hw * 1.4);
  const wOff = worldOffset + 80 + Math.random() * 20;
  const screenZ = worldOffset - wOff;

  const color = isSpeed ? 0x00AAFF : 0xFF8800;
  const emColor = isSpeed ? 0x00FFFF : 0xFFAA00;

  const padGeo = new THREE.BoxGeometry(4.5, 0.25, 4.5);
  const padMat = new THREE.MeshStandardMaterial({
    color, emissive: emColor, emissiveIntensity: 2.0,
    roughness: 0.1, metalness: 0.8,
  });
  const mesh = new THREE.Mesh(padGeo, padMat);
  mesh.position.set(xPos, 0.15, screenZ);
  mesh.castShadow = false; mesh.receiveShadow = true;

  // 边框光圈
  const ringMat = new THREE.MeshBasicMaterial({ color: emColor, transparent: true, opacity: 0.6 });
  const ring = new THREE.Mesh(new THREE.TorusGeometry(2.2, 0.1, 8, 32), ringMat);
  ring.rotation.x = Math.PI/2; ring.position.y = 0.15;
  mesh.add(ring);

  // 地面标识箭头
  const arrowMat = new THREE.MeshBasicMaterial({ color: emColor, transparent: true, opacity: 0.4 });
  const arrowGeo = new THREE.ConeGeometry(0.7, 1.4, 6);
  const arrow = new THREE.Mesh(arrowGeo, arrowMat);
  arrow.position.set(0, isSpeed ? -0.5 : 0.9, 0);
  arrow.rotation.z = isSpeed ? Math.PI/2 : 0;
  mesh.add(arrow);

  scene.add(mesh);
  specialPads.push({ mesh, ring, wOff, isSpeed, triggered: false });
}

function updateSpecialPads(dt){
  const stg = getCurrentStage();
  const feat = stg.specialFeature;
  if(!feat || (feat !== 'bouncePad' && feat !== 'speedBoostPad' && feat !== 'allFeatures')) return;

  // 生成
  const spacing = 80 + Math.random() * 40;
  if(gs.distance > lastPadDist + spacing && !stageState.cleared){
    const isSpeed = (feat === 'speedBoostPad') || (feat === 'allFeatures' && Math.random() > 0.5);
    spawnBouncePad(isSpeed);
    lastPadDist = gs.distance;
  }

  const lead = getLeadBall();
  const leadPos = lead ? lead.mesh.position : null;

  for(let i = specialPads.length - 1; i >= 0; i--){
    const pad = specialPads[i];
    const screenZ = worldOffset - pad.wOff;
    pad.mesh.position.z = screenZ;

    // 光环旋转
    pad.ring.rotation.z += dt * 1.8;
    pad.mesh.material.emissiveIntensity = 1.8 + Math.sin(Date.now() * 0.005 + i) * 0.5;

    // 触发检测
    if(!pad.triggered && leadPos){
      const dx = leadPos.x - pad.mesh.position.x;
      const dz = leadPos.z - pad.mesh.position.z;
      const dist2d = Math.sqrt(dx*dx + dz*dz);
      const onPad = dist2d < 3.0 && leadPos.y < 2.5;

      if(onPad){
        pad.triggered = true;
        if(pad.isSpeed){
          // 加速板
          atkState.speedBoost.active = true;
          atkState.speedBoost.timer = 2.4;
          atkState.speedBoost.mul = 1.38;
          showAtkMsg('💨 加速冲刺！', '#00AAFF');
          screenFlash.active = true; screenFlash.t0 = Date.now();
          screenFlash.dur = 0.25; screenFlash.color = 'rgba(0,180,255,0.25)';
        } else {
          // 弹跳垫
          physics.velY = 22;
          physics.onGround = false;
          showAtkMsg('🟠 弹跳！', '#FF8800');
          doShake(0.15, 0.2);
          emit(pad.mesh.position, '#FF8800', 25, 'fusion');
        }
        // 踩下动画
        pad.mesh.scale.y = 0.3;
        setTimeout(()=>{ if(pad.mesh) pad.mesh.scale.y = 1.0; }, 200);
      }
    }

    if(worldOffset > pad.wOff + 30){ scene.remove(pad.mesh); specialPads.splice(i, 1); }
  }
}

// ── 特殊特性激活总入口 ──
function activateSpecialFeature(stg){
  const feat = stg.specialFeature;

  // 关闭上一关残留的特殊状态
  darkZoneState.active = false;
  lavaFloorState.active = false;
  doubleScoreState.active = false;
  specialPads.forEach(p => scene.remove(p.mesh));
  specialPads.length = 0;
  lastPadDist = gs.distance;
  stopTutorial();

  // 清理特效遮罩
  const dzo = document.getElementById('dark-zone-overlay');
  const lvo = document.getElementById('lava-overlay');
  if(dzo) dzo.style.display = 'none';
  if(lvo) lvo.style.display = 'none';

  if(!feat) return;

  switch(feat){
    case 'tutorial':
      if(stg.tutorialSteps) startTutorial(stg.tutorialSteps);
      break;
    case 'shootIntro':
      setTimeout(()=>showAtkMsg('💡 鼠标左键射击！J键也可以', '#00d4ff'), 2000);
      break;
    case 'attackIntro':
      setTimeout(()=>showAtkMsg('⚡ 解锁技能！Q/W/E试试看', '#aa44ff'), 2000);
      break;
    case 'magnetIntro':
      setTimeout(()=>showAtkMsg('🧲 发现磁力道具！靠近即可拾取', '#00ffcc'), 2500);
      break;
    case 'doubleScoreZone':
      doubleScoreState.active = true;
      break;
    case 'bouncePad':
    case 'speedBoostPad':
      // 进入后第一个垫子在100距离后生成
      lastPadDist = gs.distance + 60;
      break;
    case 'darkZone':
      ensureDarkZoneOverlay();
      darkZoneState.active = true;
      darkZoneState.timer = 0;
      break;
    case 'lavaFloor':
      ensureLavaOverlay();
      lavaFloorState.active = true;
      lavaFloorState.timer = 0;
      break;
    case 'allFeatures':
      ensureDarkZoneOverlay();
      ensureLavaOverlay();
      darkZoneState.active = true;
      lavaFloorState.active = true;
      doubleScoreState.active = true;
      darkZoneState.timer = 0;
      lavaFloorState.timer = 0;
      lastPadDist = gs.distance + 60;
      break;
  }
}

// ── 无敌状态视觉效果（2D叠加层）──
function drawInvincibleEffect(){
  if(!invincibleActive) return;
  const lead = getLeadBall();
  if(!lead) return;
  const pos = lead.mesh.position.clone();
  pos.project(camera);
  const sx = (pos.x + 1) / 2 * cvs2.width;
  const sy = (-pos.y + 1) / 2 * cvs2.height;
  const pulse = 0.5 + 0.4 * Math.sin(Date.now() * 0.01);
  ctx.save();
  ctx.strokeStyle = `rgba(255,220,50,${0.5 * pulse})`;
  ctx.lineWidth = 3;
  ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 16;
  ctx.beginPath(); ctx.arc(sx, sy, 55 * pulse, 0, Math.PI*2); ctx.stroke();
  ctx.strokeStyle = `rgba(255,255,100,${0.3 * pulse})`;
  ctx.beginPath(); ctx.arc(sx, sy, 80 * pulse, 0, Math.PI*2); ctx.stroke();
  // 无敌倒计时
  const timeLeft = invincibleTimer.toFixed(1);
  ctx.font = '700 13px Arial';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#FFD700'; ctx.shadowBlur = 10;
  ctx.fillText(`⭐${timeLeft}s`, sx, sy - 70);
  ctx.restore();
}

// ── 攻击状态 ──
const atkState = {
  // 冲刺撞击
  dash:       { active:false, cd:0, startPos:new THREE.Vector3(), dist:0, trailParts:[] },
  // 千斤坠
  slam:       { active:false, cd:0, falling:false },
  // 旋刃横扫
  spin:       { active:false, cd:0, timer:0, angle:0, shield:false },
  // 能量爆震
  blast:      { active:false, cd:0, timer:0 },
  // 速度加成（爆震附带）
  speedBoost: { active:false, timer:0, mul:1 },
};

// ── 攻击提示文字 ──
const atkMsgFX = { active:false, text:'', color:'#fff', t0:0, dur:1.0 };
function showAtkMsg(text, color){

  atkMsgFX.t0=Date.now(); atkMsgFX.dur=1.0;

// ─────────────────────────────────────
//  1. 冲刺撞击
// ─────────────────────────────────────
function triggerDash(){
  const s = atkState.dash;
  if(s.active || s.cd > 0) return;
  if(!spendEnergy(CFG.atkDashCost)) return;
  if(!pBalls.length) return;

  s.active = true;
  s.startPos.copy(getLeadPos());
  s.dist = 0;
  s.cd = CFG.atkDashCD;
  s.trailParts = [];

  // 视觉：霓虹拖尾粒子
  const lead = getLeadBall();
  if(lead){
    emit(lead.mesh.position, '#00e5ff', 35, 'fusion');
    // 添加拖尾光源
    const tl = new THREE.PointLight(0x00e5ff, 4, 15);
    tl.position.copy(lead.mesh.position);
    scene.add(tl);
    s._trailLight = tl;
  }

  doShake(0.2, 0.25);
  showAtkMsg('⚡ 冲刺撞击!', '#00e5ff');
}

function updateDash(dt){
  const s = atkState.dash;
  if(s.cd > 0) s.cd -= dt;
  if(!s.active) return;

  const lead = getLeadBall();
  if(!lead){ s.active=false; return; }

  // 前冲：沿-Z方向高速移动
  const dashSpd = CFG.atkDashSpeed;
  lead.mesh.position.z -= dashSpd * dt;
  s.dist += dashSpd * dt;

  // 拖尾粒子
  if(Math.random() < 0.8){
    emit(lead.mesh.position, '#00e5ff', 3, 'fusion');
  }

  // 拖尾光源跟随
  if(s._trailLight){
    s._trailLight.position.copy(lead.mesh.position);
    s._trailLight.position.z += 2;
    s._trailLight.intensity = Math.max(0, 4 * (1 - s.dist / CFG.atkDashDist));
  }

  // 冲刺碰撞检测：撞同色球合成 + 撞障碍清除
  const dashPos = lead.mesh.position;
  const dashR = CFG.atkDashRadius;

  // 撞路边球 → 直接合成
  for(let i=roadBalls.length-1;i>=0;i--){
    const rb=roadBalls[i];
    if(rb.collected) continue;
    if(dashPos.distanceTo(rb.mesh.position) < dashR + radius(rb.lvl)){
      rb.collected=true;
      emit(rb.mesh.position, LEVELS[rb.lvl-1].h, 30, 'fusion');
      scene.remove(rb.mesh); scene.remove(rb.glow);
      addPlayerBall(rb.lvl);
      gs.score += rb.lvl * 10;
      gainEnergy(CFG.energyGainCollect);
      roadBalls.splice(i,1);
    }
  }

  // 撞黑铁球 → 清除（冲刺克制烈焰魔）
  for(let i=blackBalls.length-1;i>=0;i--){
    const ob=blackBalls[i];
    if(ob.destroyed) continue;
    const et = CFG.enemyTypes[ob.enemyType || 0];
    if(dashPos.distanceTo(ob.mesh.position) < dashR + et.radius){
      const killed = damageEnemy(ob, 'dash', 2);
      if(killed) blackBalls.splice(i,1);
    }
  }

  // 撞陷阱栏 → 清除
  for(let i=traps.length-1;i>=0;i--){
    const t=traps[i];
    if(t.destroyed) continue;
    const tPos = t.mesh.position;
    if(dashPos.distanceTo(tPos) < dashR + 4){
      t.destroyed=true;
      emit(tPos, '#ff6600', 30, 'break');
      scene.remove(t.mesh); scene.remove(t.glow);
      traps.splice(i,1);
      gs.score += 40;
      gainEnergy(CFG.energyGainDestroy);
    }
  }

  // 冲击波视觉：到达终点爆炸
  if(s.dist >= CFG.atkDashDist){
    s.active = false;
    emit(lead.mesh.position, '#00e5ff', 60, 'fusion');
    doShake(0.35, 0.3);
    // 移除拖尾光源
    if(s._trailLight){ scene.remove(s._trailLight); s._trailLight=null; }
    const fc = doFusion();
    if(fc > 0) showCombo(fc);
    updateFusionHUD();
  }
}

// ─────────────────────────────────────
//  2. 千斤坠
// ─────────────────────────────────────
function triggerSlam(){
  const s = atkState.slam;
  if(s.active || s.cd > 0) return;
  if(!spendEnergy(CFG.atkSlamCost)) return;
  if(!pBalls.length) return;

  // 必须在空中才能触发
  const lead = getLeadBall();
  if(!lead || lead.onGround) return;

  s.active = true;
  s.falling = true;
  s.cd = CFG.atkSlamCD;

  // 立即高速下坠
  physics.velY = -40;
  lead.vy = -40;

  showAtkMsg('💥 千斤坠!', '#ff6600');
}

function updateSlam(dt){
  const s = atkState.slam;
  if(s.cd > 0) s.cd -= dt;
  if(!s.active) return;

  const lead = getLeadBall();
  if(!lead){ s.active=false; return; }

  // 下坠中产生火星粒子
  if(s.falling){
    if(Math.random() < 0.6){
      emit(lead.mesh.position, '#ff6600', 2, 'hit');
    }
    // 检测着地
    if(lead.onGround || lead.mesh.position.y <= radius(lead.lvl) - 0.5){
      s.falling = false;
      onSlamLand();
    }
  }
}

function onSlamLand(){
  const s = atkState.slam;
  const lead = getLeadBall();
  if(!lead) return;

  const pos = lead.mesh.position.clone();
  const blastR = CFG.atkSlamRadius;

  // ── 霓虹波纹视觉 ──
  // 扩展环形冲击波
  const ringGeo = new THREE.RingGeometry(0.5, 1.5, 32);
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0xff6600, transparent:true, opacity:0.9, side:THREE.DoubleSide,
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI/2;
  ring.position.set(pos.x, pos.y + 0.1, pos.z);
  scene.add(ring);
  // 动画扩展环
  const ringT0 = Date.now();
  const ringAnim = { mesh:ring, t0:ringT0, dur:0.8, maxR:blastR };
  atkSlamRings.push(ringAnim);

  // ── 火星粒子 ──
  emit(pos, '#ff6600', 80, 'fusion');
  emit(pos, '#ffcc00', 40, 'fusion');

  // ── 范围清障 + 合成 ──
  // 清除黑铁球（千斤坠克制寒冰晶）
  for(let i=blackBalls.length-1;i>=0;i--){
    const ob=blackBalls[i];
    if(ob.destroyed) continue;
    const et = CFG.enemyTypes[ob.enemyType || 0];
    if(pos.distanceTo(ob.mesh.position) < blastR + et.radius){
      const killed = damageEnemy(ob, 'slam', 2);
      if(killed) blackBalls.splice(i,1);
    }
  }

  // 清除陷阱
  for(let i=traps.length-1;i>=0;i--){
    const t=traps[i];
    if(t.destroyed) continue;
    if(pos.distanceTo(t.mesh.position) < blastR + 3){
      t.destroyed=true;
      emit(t.mesh.position, '#ff6600', 25, 'break');
      scene.remove(t.mesh); scene.remove(t.glow);
      traps.splice(i,1);
      gs.score += 30;
      gainEnergy(CFG.energyGainDestroy);
    }
  }

  // 拾取路边球合成
  for(let i=roadBalls.length-1;i>=0;i--){
    const rb=roadBalls[i];
    if(rb.collected) continue;
    if(pos.distanceTo(rb.mesh.position) < blastR + radius(rb.lvl)){
      rb.collected=true;
      emit(rb.mesh.position, LEVELS[rb.lvl-1].h, 25, 'fusion');
      scene.remove(rb.mesh); scene.remove(rb.glow);
      addPlayerBall(rb.lvl);
      gs.score += rb.lvl * 10;
      gainEnergy(CFG.energyGainCollect);
      roadBalls.splice(i,1);
    }
  }

  const fc = doFusion();
  if(fc > 0) showCombo(fc);
  updateFusionHUD();

  doShake(0.5, 0.5);
  s.active = false;
}

// 千斤坠波纹动画列表
const atkSlamRings = [];

function updateSlamRings(dt){
  for(let i=atkSlamRings.length-1;i>=0;i--){
    const r = atkSlamRings[i];
    const t = (Date.now() - r.t0) / 1000 / r.dur;
    if(t >= 1){
      scene.remove(r.mesh);
      if(r.mesh.geometry) r.mesh.geometry.dispose();
      if(r.mesh.material) r.mesh.material.dispose();
      atkSlamRings.splice(i,1);
      continue;
    }
    const scale = 1 + t * r.maxR;
    r.mesh.scale.set(scale, scale, 1);
    r.mesh.material.opacity = 0.9 * (1 - t);
  }
}

// ─────────────────────────────────────
//  3. 旋刃横扫
// ─────────────────────────────────────
let spinBlade = null;  // 旋转刃波Mesh

function triggerSpin(){
  const s = atkState.spin;
  if(s.active || s.cd > 0) return;
  if(!spendEnergy(CFG.atkSpinCost)) return;
  if(!pBalls.length) return;

  s.active = true;
  s.cd = CFG.atkSpinCD;
  s.timer = CFG.atkSpinDuration;
  s.angle = 0;
  s.shield = true;  // 免伤开启

  // ── 霓虹光刃视觉 ──
  const pos = getLeadPos();
  const bladeGeo = new THREE.TorusGeometry(CFG.atkSpinRadius, 0.25, 8, 64);
  const bladeMat = new THREE.MeshStandardMaterial({
    color: 0xaa44ff, emissive: 0xaa44ff, emissiveIntensity: 5,
    transparent: true, opacity: 0.85, roughness: 0, metalness: 1,
  });
  spinBlade = new THREE.Mesh(bladeGeo, bladeMat);
  spinBlade.rotation.x = Math.PI/2;
  spinBlade.position.copy(pos);
  scene.add(spinBlade);

  // 中心光源
  const bLight = new THREE.PointLight(0xaa44ff, 5, 20);
  spinBlade.add(bLight);

  showAtkMsg('🌀 旋刃横扫!', '#aa44ff');
}

function updateSpin(dt){
  const s = atkState.spin;
  if(s.cd > 0) s.cd -= dt;
  if(!s.active) return;

  s.timer -= dt;
  s.angle += dt * 12;  // 旋转速度

  const lead = getLeadBall();
  if(!lead){ endSpin(); return; }

  const pos = lead.mesh.position;

  // 旋转刃波跟随球心
  if(spinBlade){
    spinBlade.position.copy(pos);
    spinBlade.rotation.z = s.angle;
    // 淡出
    const ratio = Math.max(0, s.timer / CFG.atkSpinDuration);
    spinBlade.material.opacity = 0.85 * ratio;
    spinBlade.scale.setScalar(1 + (1-ratio)*0.3);
  }

  // 旋转粒子
  if(Math.random() < 0.5){
    const a = Math.random() * Math.PI * 2;
    const r = CFG.atkSpinRadius * (0.8 + Math.random()*0.4);
    const pPos = new THREE.Vector3(
      pos.x + Math.cos(a)*r,
      pos.y + Math.random()*2,
      pos.z + Math.sin(a)*r
    );
    emit(pPos, '#aa44ff', 1, 'hit');
  }

  // ── 范围碰撞检测（持续扫击） ──
  const spinR = CFG.atkSpinRadius;

  // 清除黑铁球（旋刃克制雷暴核）
  for(let i=blackBalls.length-1;i>=0;i--){
    const ob=blackBalls[i];
    if(ob.destroyed) continue;
    const et = CFG.enemyTypes[ob.enemyType || 0];
    if(pos.distanceTo(ob.mesh.position) < spinR + et.radius){
      const killed = damageEnemy(ob, 'spin', 2);
      if(killed) blackBalls.splice(i,1);
    }
  }

  // 清除陷阱
  for(let i=traps.length-1;i>=0;i--){
    const t=traps[i];
    if(t.destroyed) continue;
    if(pos.distanceTo(t.mesh.position) < spinR + 3){
      t.destroyed=true;
      emit(t.mesh.position, '#ff6600', 20, 'break');
      scene.remove(t.mesh); scene.remove(t.glow);
      traps.splice(i,1);
      gs.score += 30;
      gainEnergy(CFG.energyGainDestroy);
    }
  }

  // 拾取路边球合成
  for(let i=roadBalls.length-1;i>=0;i--){
    const rb=roadBalls[i];
    if(rb.collected) continue;
    if(pos.distanceTo(rb.mesh.position) < spinR + radius(rb.lvl)){
      rb.collected=true;
      emit(rb.mesh.position, LEVELS[rb.lvl-1].h, 20, 'fusion');
      scene.remove(rb.mesh); scene.remove(rb.glow);
      addPlayerBall(rb.lvl);
      gs.score += rb.lvl*10;
      gainEnergy(CFG.energyGainCollect);
      roadBalls.splice(i,1);
    }
  }

  // 免伤：球不受伤
  // （通过 s.shield 标志，在碰撞检测中跳过伤害逻辑）

  // 定时结束
  if(s.timer <= 0) endSpin();
}

function endSpin(){
  const s = atkState.spin;
  s.active = false;
  s.shield = false;
  if(spinBlade){
    scene.remove(spinBlade);
    if(spinBlade.geometry) spinBlade.geometry.dispose();
    if(spinBlade.material) spinBlade.material.dispose();
    spinBlade = null;
  }
  const fc = doFusion();
  if(fc > 0) showCombo(fc);
  updateFusionHUD();
}

// ─────────────────────────────────────
//  4. 能量爆震
// ─────────────────────────────────────
let blastWaveMesh = null;

function triggerBlast(){
  const s = atkState.blast;
  if(s.active || s.cd > 0) return;
  if(energy.val < CFG.atkBlastCost) return;
  if(!pBalls.length) return;

  spendEnergy(CFG.atkBlastCost);
  s.active = true;
  s.cd = CFG.atkBlastCD;
  s.timer = 1.2;

  const pos = getLeadPos();
  const blastR = CFG.atkBlastRadius;

  // ── 霓虹能量场视觉 ──
  const waveGeo = new THREE.SphereGeometry(blastR, 32, 32);
  const waveMat = new THREE.MeshBasicMaterial({
    color: 0xff4444, transparent:true, opacity:0.5, wireframe:true,
  });
  blastWaveMesh = new THREE.Mesh(waveGeo, waveMat);
  blastWaveMesh.position.copy(pos);
  scene.add(blastWaveMesh);

  // 中心闪光
  const flashLight = new THREE.PointLight(0xff4444, 10, 40);
  flashLight.position.copy(pos);
  scene.add(flashLight);
  setTimeout(()=>{ scene.remove(flashLight); }, 500);

  // ── 范围清障 + 合成 ──
  // 清除所有范围内黑铁球（爆震克制泰坦壳）
  for(let i=blackBalls.length-1;i>=0;i--){
    const ob=blackBalls[i];
    if(ob.destroyed) continue;
    const et = CFG.enemyTypes[ob.enemyType || 0];
    if(pos.distanceTo(ob.mesh.position) < blastR + et.radius){
      const killed = damageEnemy(ob, 'blast', 3);
      if(killed) blackBalls.splice(i,1);
    }
  }

  // 清除所有范围内陷阱
  for(let i=traps.length-1;i>=0;i--){
    const t=traps[i];
    if(t.destroyed) continue;
    if(pos.distanceTo(t.mesh.position) < blastR + 4){
      t.destroyed=true;
      emit(t.mesh.position, '#ff6600', 30, 'break');
      scene.remove(t.mesh); scene.remove(t.glow);
      traps.splice(i,1);
      gs.score += 50;
      gainEnergy(CFG.energyGainDestroy);
    }
  }

  // 清除桥梁柱子（让桥塌）
  for(const b of bridges){
    if(b.destroyed) continue;
    if(pos.distanceTo(b.group.position) < blastR + 5){
      b.destroyed = true;
      emit(b.group.position, '#ff4444', 60, 'fusion');
      doShake(0.6, 0.5);
    }
  }

  // 拾取路边球合成
  for(let i=roadBalls.length-1;i>=0;i--){
    const rb=roadBalls[i];
    if(rb.collected) continue;
    if(pos.distanceTo(rb.mesh.position) < blastR + radius(rb.lvl)){
      rb.collected=true;
      emit(rb.mesh.position, LEVELS[rb.lvl-1].h, 30, 'fusion');
      scene.remove(rb.mesh); scene.remove(rb.glow);
      addPlayerBall(rb.lvl);
      gs.score += rb.lvl*10;
      gainEnergy(CFG.energyGainCollect);
      roadBalls.splice(i,1);
    }
  }

  // ── 加速效果 ──
  atkState.speedBoost.active = true;
  atkState.speedBoost.timer = CFG.atkBlastSpeedDur;
  atkState.speedBoost.mul = CFG.atkBlastSpeedMul;

  // ── 粒子爆炸 ──
  emit(pos, '#ff4444', 120, 'fusion');
  emit(pos, '#ffcc00', 60, 'fusion');

  const fc = doFusion();
  if(fc > 0) showCombo(fc);
  updateFusionHUD();

  doShake(0.7, 0.6);
  showAtkMsg('🔥 能量爆震!', '#ff4444');

  // ── 屏幕闪烁效果（通过2D canvas绘制） ──
  screenFlash.active = true;
  screenFlash.t0 = Date.now();
  screenFlash.dur = 0.4;
  screenFlash.color = 'rgba(255,60,60,0.35)';
}

// 屏幕闪烁状态
const screenFlash = { active:false, t0:0, dur:0, color:'' };

function updateBlast(dt){
  const s = atkState.blast;
  if(s.cd > 0) s.cd -= dt;
  if(!s.active) return;

  s.timer -= dt;
  const lead = getLeadBall();

  // 能量场跟随球心 + 淡出
  if(blastWaveMesh){
    if(lead) blastWaveMesh.position.copy(lead.mesh.position);
    const ratio = Math.max(0, s.timer / 1.2);
    blastWaveMesh.material.opacity = 0.5 * ratio;
    blastWaveMesh.scale.setScalar(1 + (1-ratio)*0.5);
    // 旋转
    blastWaveMesh.rotation.y += dt * 3;
    blastWaveMesh.rotation.x += dt * 2;
  }

  if(s.timer <= 0){
    s.active = false;
    if(blastWaveMesh){
      scene.remove(blastWaveMesh);
      if(blastWaveMesh.geometry) blastWaveMesh.geometry.dispose();
      if(blastWaveMesh.material) blastWaveMesh.material.dispose();
      blastWaveMesh = null;
    }
  }
}

}

// ── 攻击冷却HUD更新 ──
function updateAtkHUD(){
  const slots = [
    { id:'atk-dash', cd:atkState.dash.cd, maxCD:CFG.atkDashCD },
    { id:'atk-slam', cd:atkState.slam.cd, maxCD:CFG.atkSlamCD },
    { id:'atk-spin', cd:atkState.spin.cd, maxCD:CFG.atkSpinCD },
    { id:'atk-blast', cd:atkState.blast.cd, maxCD:CFG.atkBlastCD },
  ];
  for(const s of slots){
    const el = document.getElementById(s.id);
    if(!el) continue;
    const overlay = el.querySelector('.atk-cd-overlay');
    if(!overlay) continue;
    if(s.cd > 0){
      const pct = (s.cd / s.maxCD * 100).toFixed(1);
      overlay.style.height = pct + '%';
      el.classList.remove('ready');
    } else {
      overlay.style.height = '0%';
      // 爆震需要满能量才ready
      if(s.id === 'atk-blast'){
        if(energy.val >= CFG.atkBlastCost) el.classList.add('ready');
        else el.classList.remove('ready');
      } else {
        el.classList.add('ready');
      }
    }
    // 激活状态
    const isActive = (s.id==='atk-dash' && atkState.dash.active) ||
                     (s.id==='atk-slam' && atkState.slam.active) ||
                     (s.id==='atk-spin' && atkState.spin.active) ||
                     (s.id==='atk-blast' && atkState.blast.active);
    if(isActive) el.classList.add('active');
    else el.classList.remove('active');
  }
}

// ── 攻击提示文字绘制 ──
function drawAtkMsg(){
  if(!atkMsgFX.active) return;
  const el = (Date.now()-atkMsgFX.t0)/1000;
  if(el > atkMsgFX.dur){ atkMsgFX.active=false; return; }
  const p = el / atkMsgFX.dur;
  const alpha = p < 0.2 ? p/0.2 : Math.max(0, 1-((p-0.2)/0.8));
  const sc = 1 + Math.sin(p*Math.PI)*0.15;
  ctx.save();
  ctx.globalAlpha = alpha * 0.95;
  const fs = Math.round(42 * sc);
  ctx.font = `900 ${fs}px 'Segoe UI',Arial`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = atkMsgFX.color;
  ctx.shadowBlur = 25;
  ctx.fillStyle = atkMsgFX.color;
  ctx.fillText(atkMsgFX.text, cvs2.width/2, cvs2.height*0.35 - p*60);
  ctx.restore();
}

// ── 屏幕闪烁绘制 ──
function drawScreenFlash(){
  if(!screenFlash.active) return;
  const el = (Date.now()-screenFlash.t0)/1000;
  if(el > screenFlash.dur){ screenFlash.active=false; return; }
  const alpha = 1 - el/screenFlash.dur;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = screenFlash.color;
  ctx.fillRect(0,0,cvs2.width,cvs2.height);
  ctx.restore();
}

// ── 怪物属性标签绘制 ↓新增 ──
function drawEnemyLabels(){
  for(const ob of blackBalls){
    if(ob.destroyed) continue;
    const obScreenZ = worldOffset - ob.wOff;
    if(Math.abs(obScreenZ) > 20) continue;
    if(ob.enemyType === 0) continue;  // 普通黑铁球不显示标签
    const et = CFG.enemyTypes[ob.enemyType];
    const v = ob.mesh.position.clone();
    v.project(camera);
    if(v.z > 1) continue;
    const sx = (v.x+1)/2 * cvs2.width;
    const sy = (-v.y+1)/2 * cvs2.height;
    ctx.save();
    ctx.globalAlpha = 0.85;
    // 属性名
    ctx.font = '700 12px Arial';
    ctx.textAlign = 'center';
    ctx.fillStyle = `#${et.ring.toString(16).padStart(6,'0')}`;
    ctx.shadowColor = `#${et.ring.toString(16).padStart(6,'0')}`;
    ctx.shadowBlur = 8;
    ctx.fillText(et.name, sx, sy - et.radius * 18 - 8);
    // 弱点提示
    const weakMap = { dash:'冲刺', slam:'千斤坠', spin:'旋刃', blast:'爆震' };
    if(et.weakTo !== 'any'){
      ctx.font = '600 10px Arial';
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fillText('弱点:' + (weakMap[et.weakTo]||''), sx, sy - et.radius * 18 + 6);
    }
    // HP条
    const barW = 40, barH = 3;
    const hpRatio = ob.hp / ob.maxHp;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(sx - barW/2, sy - et.radius * 18 + 12, barW, barH);
    ctx.fillStyle = `#${et.ring.toString(16).padStart(6,'0')}`;
    ctx.fillRect(sx - barW/2, sy - et.radius * 18 + 12, barW * hpRatio, barH);
    ctx.restore();
  }
}

// ================================================================
let shake={active:false,i:0,dur:0,t0:0,orig:new THREE.Vector3()};
function doShake(i,d){shake={active:true,i,dur:d,t0:Date.now(),orig:camera.position.clone()};}

function updateCam(){
  const lp=getLeadPos();
  const speedRatio=clamp01(gs.currentSpeedPS/Math.max(1, CFG.maxSpeedPS));
  const cp=getCurrentChunkProps();  // ↓新增：适配轨道起伏

  const targetFOV=CFG.camFOV + (CFG.camMaxFOV - CFG.camFOV) * Math.pow(speedRatio, 0.75);
  if(Math.abs(camera.fov-targetFOV)>0.02){
    camera.fov += (targetFOV-camera.fov)*0.08;
    camera.updateProjectionMatrix();
  }

  const targetCamY=lp.y+CFG.camHeight+speedRatio*1.4+cp.elevation*0.5;  // ↓修改：高速时保持低角度，速度感更强
  const targetCamZ=CFG.camBack+speedRatio*2.0;
  const targetCamX=lp.x*0.5;
  camera.position.x+=(targetCamX-camera.position.x)*0.10;
  camera.position.y+=(targetCamY-camera.position.y)*0.08;
  camera.position.z+=(targetCamZ-camera.position.z)*0.05;

  const lookTargetX=lp.x*0.8;
  camera.lookAt(lookTargetX,lp.y+1.0+cp.elevation*0.5,-22-speedRatio*18);  // ↓修改：看向更远处，强化前冲感
  shake.orig.copy(camera.position);
}

function updateShake(){
  if(!shake.active)return;
  const e=(Date.now()-shake.t0)/1000;
  if(e>shake.dur){shake.active=false;return;}
  const t=1-e/shake.dur;
  camera.position.x=shake.orig.x+(Math.random()-0.5)*shake.i*2*t;
  camera.position.y=shake.orig.y+(Math.random()-0.5)*shake.i*t;
}

      // ↓修改：W键 → 千斤坠（空中）或跳跃补充
      if(!physics.onGround && pBalls.length) triggerSlam();
      else if(physics.onGround){ physics.velY=12; physics.onGround=false; }
      break;
    case 'KeyS':
      ctl.backward=true;
      break;
    case 'KeyA':ctl.left=true;break;
    case 'KeyD':ctl.right=true;break;
    case 'Space':
      ctl.jump=true;
      // ↓修改：跳跃联动 — 起跳时自动触发旋刃横扫（如有能量）
      if(physics.onGround && pBalls.length && atkState.spin.cd <= 0 && energy.val >= CFG.atkSpinCost){
        triggerSpin();
      }
      e.preventDefault();
      break;
    case 'KeyQ':
      // ↓修改：Q键 → 冲刺撞击
      triggerDash();
      break;
    case 'KeyE':
      // ↓修改：E键 → 旋刃横扫
      triggerSpin();
      break;
    case 'KeyR':
      // ↓修改：R键 → 能量爆震
      triggerBlast();
      break;
    case 'KeyJ':ctl.shoot=true;break;
    case 'ShiftLeft':case 'ShiftRight':
      ctl.boost=true;
      break;
  }
});
document.addEventListener('keyup',e=>{
  switch(e.code){
    case 'KeyW':break;  // W不再控制forward
    case 'KeyS':ctl.backward=false;break;
    case 'KeyA':ctl.left=false;break;
    case 'KeyD':ctl.right=false;break;
    case 'Space':ctl.jump=false;break;
    case 'KeyJ':ctl.shoot=false;break;
    case 'ShiftLeft':case 'ShiftRight':ctl.boost=false;break;
  }
});
// ↓修改：鼠标左键射击，右键触发冲刺撞击
let rightMouseDown = false;
document.addEventListener('mousedown',e=>{
  if(e.button===0){
    ctl.shoot=true;
    // ↓新增：射击联动 — 射击时微量冲刺前推
    if(pBalls.length && !atkState.dash.active && atkState.dash.cd <= 0 && energy.val >= CFG.atkDashCost * 0.5){
      // 轻量级前推效果（不消耗完整能量）
      const lead = getLeadBall();
      if(lead) lead.mesh.position.z -= 1.5;
    }
  }
  if(e.button===2){ rightMouseDown=true; triggerDash(); }
});
document.addEventListener('mouseup',e=>{
  if(e.button===0) ctl.shoot=false;
  if(e.button===2) rightMouseDown=false;
});
document.addEventListener('contextmenu',e=>e.preventDefault());  // 阻止右键菜单
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  cvs2.width=innerWidth;cvs2.height=innerHeight;
});

// ================================================================
//  主循环 ↓修改：新增节奏/雾气/主题色更新
// ================================================================
let lastTime=performance.now();

function animate(){
  requestAnimationFrame(animate);
  try{
  const now=performance.now();
  const dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;

  gs.gameTime+=dt;
  stageState.speedTime+=dt;
  stageState.targetSpeedPS=getAutoSpeedPS(stageState.speedTime);
  gs.currentSpeedPS=approachValue(gs.currentSpeedPS, stageState.targetSpeedPS, CFG.speedSmoothingK, dt);

  if(ctl.left)physics.velX-=CFG.lateralAccel*dt;
  if(ctl.right)physics.velX+=CFG.lateralAccel*dt;
  if(!ctl.left&&!ctl.right)physics.velX*=Math.pow(CFG.lateralDamp,dt*60);
  physics.velX=Math.max(-CFG.lateralMaxSpd,Math.min(CFG.lateralMaxSpd,physics.velX));

  // ↓修改：跳跃 — 空中时可发动千斤坠（W键），地面跳跃时联动旋刃
  if(ctl.jump&&physics.onGround){
    physics.velY=12;physics.onGround=false;
    // ↓新增：跳跃时自动射击一发（跳跃-射击联动）
    if(shootCooldown<=0) fireBullet(false);
  }
  if(!physics.onGround)physics.velY-=PHY.gravity*dt;

  // ↓修改：自动前进 — 不再需要按W
  let fwdAdj=0;
  if(ctl.boost)fwdAdj=gs.currentSpeedPS*0.35;    // Shift加速
  if(ctl.backward)fwdAdj=-gs.currentSpeedPS*0.45; // S减速
  // ↓修改：速度加成（能量爆震附带）
  let totalSpeedPS=Math.max(0,gs.currentSpeedPS+fwdAdj);
  if(atkState.speedBoost.active) totalSpeedPS*=Math.min(atkState.speedBoost.mul, 1.45);

  worldOffset+=totalSpeedPS*dt;
  gs.distance=worldOffset;

  const moveX=physics.velX*dt;
  const moveY=physics.velY*dt;

  const lead=getLeadBall();
  // ↓新增：高度限制 — 防止球飞出视野
  const maxJumpY = 18;
  if(lead && lead.mesh.position.y > maxJumpY){
    lead.mesh.position.y = maxJumpY;
    if(physics.velY > 0) physics.velY *= 0.3;
  }
  if(lead){
    lead.mesh.position.x+=moveX;
    lead.mesh.position.y+=moveY;
    // ↓修改：冲刺期间不拉回Z，冲刺结束后也不回撤，让球保持在冲刺位置
    if(!atkState.dash.active){
      // 非冲刺时缓慢归位（非常慢的衰减，让玩家感觉球自然回到视野中心）
      lead.mesh.position.z *= 0.97;
    }
    lead.vx=physics.velX;lead.vy=physics.velY;lead.vz=0;

    const rr=radius(lead.lvl);
    const cp=getCurrentChunkProps();
    const effectiveHW=(cp.width/2)*Math.cos(cp.tiltAngle)-rr-0.3;
    const hw=effectiveHW;
    if(lead.mesh.position.x<-hw){lead.mesh.position.x=-hw;physics.velX=Math.max(0,physics.velX);lead.vx=0;}
    if(lead.mesh.position.x>hw){lead.mesh.position.x=hw;physics.velX=Math.min(0,physics.velX);lead.vx=0;}

    // ↓新增：球的Y跟随起伏地形
    const groundY=rr-0.5+cp.elevation;
    if(lead.mesh.position.y<=groundY){
      lead.mesh.position.y=groundY;
      physics.velY=0;lead.vy=0;
      physics.onGround=true;lead.onGround=true;
    }

    // ↓新增：弯曲产生的离心力推球
    if(gs.phase>=2&&Math.abs(cp.bendAngle)>0.01){
      const centrifugal=cp.bendAngle*gs.currentSpeedPS*0.15;
      lead.mesh.position.x+=centrifugal*dt;
    }

    lead.mesh.rotation.x-=totalSpeedPS*dt*0.4;
    lead.mesh.rotation.z=-physics.velX*0.008;
    if(lead._sa){
      const s=lead.mesh.scale.x;
      const ns=s+(lead._sa.t-s)*0.14;
      lead.mesh.scale.set(ns,ns,ns);
      if(Math.abs(ns-lead._sa.t)<0.01){lead.mesh.scale.set(1,1,1);delete lead._sa;}
    }
  }

  if(lead)updateFormationTargets(lead.mesh.position);
  updateBallPhysics(dt);
  updateRoad();
  checkCollisions();
  updateBullets(dt);
  updateTraps(dt);
  updateBridges(dt);
  updateMagnetItems(dt);  // ↓新增：磁力道具更新
  updateInvincibleItems(dt); // ↓新增：无敌道具更新
  updateSpecialPads(dt);     // ↓新增：弹跳垫/加速板
  updateDarkZone(dt);        // ↓新增：暗区系统
  updateLavaFloor(dt);       // ↓新增：熔岩地板
  updateTutorial();          // ↓新增：新手教程
  updateFork();
  updateCrossroads(dt);  // ↓新增：十字路口更新
  tickFusAnim();
  updateChunks();
  updateGlobalRails();  // ↓新增：全局连续护栏更新
  updateCam();
  updateShake();
  updateNeonLights();
  updateFog();     // ↓新增：雾气跟随主题色
  checkPhase();
  updateHUD();

  if(gs.distance>lastForkDist+250){spawnFork();lastForkDist=gs.distance;}

  // ── 近战攻击更新 ↓新增 ──
  updateDash(dt);
  updateSlam(dt);
  updateSpin(dt);
  updateBlast(dt);
  updateSlamRings(dt);
  updateSpeedBoost(dt);
  updateAtkHUD();

  renderer.render(scene,camera);
  drawParticles();
  drawChargeBar();
  drawMagnetEffect();  // ↓新增：磁力吸附视觉
  drawInvincibleEffect(); // ↓新增：无敌状态视觉
  drawAtkMsg();       // 攻击提示文字
  drawScreenFlash();  // 屏幕闪烁
  drawEnemyLabels();  // ↓新增：怪物属性标签
  // ↓新增：胜利检测（未通关时持续检测）
  if(!stageState.cleared) checkVictory();
  }catch(e){
    console.error('ANIMATE ERROR:',e);
    let dbg=document.getElementById('_dbg_err');
    if(!dbg){dbg=document.createElement('div');dbg.id='_dbg_err';dbg.style.cssText='position:fixed;top:0;left:0;width:100%;max-height:40vh;overflow-y:auto;padding:16px;background:rgba(255,0,0,0.92);color:#fff;font-size:14px;z-index:99999;white-space:pre-wrap;font-family:monospace;';document.body.appendChild(dbg);}
    if(dbg.textContent.length<3000) dbg.textContent+='[ANIMATE] '+e.message+'\n';
  }
}

// ================================================================
//  开始界面
// ================================================================
const DIFF_CONFIG={
  easy:{initSpeedPS:4.3,maxSpeedPS:24.0,speedRiseK:0.028,obstacleMul:0.62,label:'简单'},
  normal:{initSpeedPS:5.2,maxSpeedPS:27.5,speedRiseK:0.032,obstacleMul:1.0,label:'普通'},
  hard:{initSpeedPS:6.2,maxSpeedPS:31.0,speedRiseK:0.038,obstacleMul:1.22,label:'困难'},
};
let currentDiff='normal';
const audioCfg={sfx:80,music:60};
let gameStarted=false;

function initStartUI(){
  const screen = document.getElementById('start-screen');
  const lsScreen = document.getElementById('level-select-screen');

  // ── 开始游戏按钮 → 进入关卡选择 ──
  document.getElementById('btn-start').addEventListener('click', () => {
    screen.classList.add('hidden');
    buildLevelSelectGrid();
    lsScreen.classList.add('show');
  });

  // ── 返回主菜单 ──
  document.getElementById('ls-back').addEventListener('click', () => {
    lsScreen.classList.remove('show');
    setTimeout(() => screen.classList.remove('hidden'), 50);
  });

  // ── 难度选择 ──
  const diffRow = document.getElementById('diff-row');
  document.getElementById('btn-diff').addEventListener('click', () => {
    diffRow.style.display = diffRow.style.display === 'none' ? 'flex' : 'none';
  });
  diffRow.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      diffRow.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentDiff = btn.dataset.diff;
    });
  });

  // ── 设置面板 ──
  const settingsPanel = document.getElementById('settings-panel');
  document.getElementById('btn-settings').addEventListener('click', () => {
    settingsPanel.classList.toggle('show');
  });
  document.getElementById('vol-sfx').addEventListener('input', e => {
    audioCfg.sfx = parseInt(e.target.value);
    document.getElementById('vol-sfx-val').textContent = audioCfg.sfx;
  });
  document.getElementById('vol-music').addEventListener('input', e => {
    audioCfg.music = parseInt(e.target.value);
    document.getElementById('vol-music-val').textContent = audioCfg.music;
  });
}

// 关卡选择卡片颜色主题（与 STAGE_CONFIGS 1-10 对应）
const STAGE_THEMES = [
  { ballColor:'#00E676', glow:'rgba(40,200,60,0.6)',   bgGrad:'rgba(0,40,8,0.5)'   },  // 1 春绿
  { ballColor:'#29B6F6', glow:'rgba(0,140,255,0.6)',   bgGrad:'rgba(0,18,45,0.5)'  },  // 2 天蓝
  { ballColor:'#CE93D8', glow:'rgba(150,60,255,0.6)',  bgGrad:'rgba(20,0,45,0.5)'  },  // 3 紫
  { ballColor:'#FFB300', glow:'rgba(255,120,0,0.6)',   bgGrad:'rgba(45,12,0,0.5)'  },  // 4 橙
  { ballColor:'#FFD740', glow:'rgba(255,200,0,0.6)',   bgGrad:'rgba(40,22,0,0.5)'  },  // 5 金
  { ballColor:'#FF1744', glow:'rgba(255,30,30,0.6)',   bgGrad:'rgba(45,0,4,0.5)'   },  // 6 红
  { ballColor:'#88AAFF', glow:'rgba(80,100,255,0.6)',  bgGrad:'rgba(2,2,20,0.5)'   },  // 7 极夜蓝
  { ballColor:'#00D4FF', glow:'rgba(0,180,255,0.6)',   bgGrad:'rgba(0,12,30,0.5)'  },  // 8 霓虹
  { ballColor:'#FF5533', glow:'rgba(255,60,20,0.6)',   bgGrad:'rgba(35,0,0,0.5)'   },  // 9 熔岩
  { ballColor:'#CC44FF', glow:'rgba(180,40,255,0.6)',  bgGrad:'rgba(8,0,18,0.5)'   },  // 10 混沌紫
];

function buildLevelSelectGrid(){
  const grid = document.getElementById('ls-grid');
  if(grid.children.length > 0) return;

  // 特殊特性文字映射
  const FEAT_LABELS = {
    tutorial:       { icon:'🎓', text:'新手教程' },
    shootIntro:     { icon:'🎯', text:'射击入门' },
    attackIntro:    { icon:'⚡', text:'技能解锁' },
    magnetIntro:    { icon:'🧲', text:'磁力道具' },
    doubleScoreZone:{ icon:'🌟', text:'双倍区域' },
    bouncePad:      { icon:'🟠', text:'弹跳垫' },
    darkZone:       { icon:'🌑', text:'暗区挑战' },
    speedBoostPad:  { icon:'💨', text:'加速板' },
    lavaFloor:      { icon:'🔥', text:'熔岩地板' },
    allFeatures:    { icon:'💀', text:'全部机关' },
  };

  STAGE_CONFIGS.forEach((stg, idx) => {
    const theme = STAGE_THEMES[idx] || STAGE_THEMES[STAGE_THEMES.length - 1];

    const blackDesc = stg.maxBlackBalls === 0 ? null : `最多${stg.maxBlackBalls}黑铁球`;
    const stageNo = String(stg.stage).padStart(2, '0');

    const card = document.createElement('div');
    card.className = 'ls-card';
    card.dataset.stage = stg.stage;
    card.style.background = theme.bgGrad;
    card.style.setProperty('--bc', theme.ballColor);

    const tags = [];
    if(!blackDesc) tags.push(`<span class="ls-tag">🛡️ 无障碍</span>`);
    else           tags.push(`<span class="ls-tag danger">⚠ ${blackDesc}</span>`);
    if(stg.hasInvincible) tags.push(`<span class="ls-tag star">⭐ 无敌</span>`);
    if(stg.doubleScore)   tags.push(`<span class="ls-tag star">🌟 双倍</span>`);
    if(stg.specialFeature && FEAT_LABELS[stg.specialFeature]){
      const fl = FEAT_LABELS[stg.specialFeature];
      tags.push(`<span class="ls-tag">${fl.icon} ${fl.text}</span>`);
    }
    if(stg.targetCount && stg.targetCount > 1){
      tags.push(`<span class="ls-tag danger">×${stg.targetCount} 多球目标</span>`);
    }

    card.innerHTML = `
      <div class="ls-num">${stageNo}</div>
      <div class="ls-ball-preview" style="background:radial-gradient(circle at 38% 35%, #fff 0%, ${theme.ballColor} 45%, ${theme.ballColor} 100%); box-shadow:0 0 18px ${theme.glow};"></div>
      <div class="ls-name">${stg.name}</div>
      <div class="ls-goal">目标：${stg.targetName}</div>
      <div class="ls-tags">${tags.join('')}</div>
    `;

    card.addEventListener('click', () => {
      const lsScreen = document.getElementById('level-select-screen');
      lsScreen.classList.remove('show');
      stageState.current = stg.stage;
      stageState.cleared = false;
      setTimeout(() => startGameFromLevel(), 100);
    });

    grid.appendChild(card);
  });
}

function startGameFromLevel(){
  if(gameStarted) return;
  gameStarted = true;
  document.getElementById('start-screen').classList.add('hidden');
  const dc = DIFF_CONFIG[currentDiff];
  CFG.initSpeedPS = dc.initSpeedPS;
  CFG.maxSpeedPS  = dc.maxSpeedPS || CFG.maxSpeedPS;
  CFG.speedRiseK  = dc.speedRiseK;
  CFG.obstacleMul = dc.obstacleMul;
  ['hud-level','hud-top','hud-fusion','hud-speed','hud-energy','hud-atk'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.style.display = '';
  });
  init();
}

function hideStartUI(){
  // 兼容保留（从第1关开始）
  if(gameStarted) return;
  stageState.current = 1;
  stageState.cleared = false;
  startGameFromLevel();
}

function showStartUI(){
  gameStarted = false;
  document.getElementById('start-screen').classList.remove('hidden');
  document.getElementById('level-select-screen').classList.remove('show');
  ['hud-level','hud-top','hud-fusion','hud-speed','hud-energy','hud-atk'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.style.display = 'none';
  });
  // 重置关卡
  stageState.current = 1;
  stageState.cleared = false;
}

initStartUI();
function init(){
  try{
  // 初始化礼花系统
  initFireworks();
  // 应用关卡1配置（天空盒等）
  applyStageConfig();
  stageState.speedTime = 0;
  stageState.targetSpeedPS = CFG.initSpeedPS;
  gs.currentSpeedPS = CFG.initSpeedPS;
  for(let i=-CFG.chunksBehind;i<=CFG.chunksAhead;i++){createChunk(i);}
  addPlayerBall(1);addPlayerBall(1);addPlayerBall(1);
  lastRbDist = gs.distance;
  for(let i=0;i<getInitialRoadBallCount();i++)spawnRoadBall();
  updateFusionHUD();
  animate();
  }catch(e){
    console.error('INIT ERROR:',e);
    const d=document.createElement('div');
    d.style.cssText='position:fixed;top:0;left:0;width:100%;padding:20px;background:red;color:white;font-size:18px;z-index:99999;white-space:pre-wrap;';
    d.textContent='INIT ERROR: '+e.message+'\n'+e.stack;
    document.body.appendChild(d);
  }
}
</script>
