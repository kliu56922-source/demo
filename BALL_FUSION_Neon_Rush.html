﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BALL FUSION — Neon Rush</title>
<link rel="icon" href="data:,">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; background:#000; font-family:'Segoe UI',Arial,sans-serif; }
canvas { display:block; }

/* ── HUD 通用玻璃卡片 ── */
.hud-card {
  position:absolute; z-index:200;
  background: rgba(5,10,25,0.72);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(100,200,255,0.18);
  border-radius: 14px;
  color: #e8f4ff;
  box-shadow: 0 4px 32px rgba(0,120,255,0.15), inset 0 1px 0 rgba(255,255,255,0.06);
}

/* ── 左上关卡信息 ── */
#hud-level {
  top:16px; left:16px;
  padding: 12px 20px;
  font-size:13px; line-height:1.8;
  color: rgba(160,210,255,0.85);
  min-width: 160px;
}
#hud-level .level-title { font-size:11px; color:rgba(100,180,255,0.7); letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; }
#hud-level .level-num   { font-size:28px; font-weight:900; color:#7df; letter-spacing:2px; line-height:1; }
#hud-level .level-goal  { font-size:12px; color:rgba(200,230,255,0.75); margin-top:4px; }
#hud-level .level-goal-ball { display:inline-block; width:14px; height:14px; border-radius:50%; vertical-align:middle; margin-right:4px; box-shadow:0 0 6px currentColor; }

/* ── 胜利界面 ── */
#victory-screen {
  position:fixed; inset:0; z-index:600;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background: radial-gradient(ellipse at 50% 40%, rgba(0,30,60,0.92) 0%, rgba(0,5,15,0.97) 70%);
  opacity:0; visibility:hidden; pointer-events:none;
  transition: opacity 0.6s ease, visibility 0.6s;
}
#victory-screen.show { opacity:1; visibility:visible; pointer-events:auto; }
.victory-title {
  font-size: clamp(52px, 9vw, 108px); font-weight:900; letter-spacing:8px;
  color:#fff; margin-bottom:8px; user-select:none;
  text-shadow: 0 0 12px #FFD700, 0 0 36px #FFD700, 0 0 70px #ff8800, 0 0 120px #ff4400;
  animation: victoryPulse 1.2s ease-in-out infinite;
}
@keyframes victoryPulse {
  0%,100%{ text-shadow: 0 0 12px #FFD700, 0 0 36px #FFD700, 0 0 70px #ff8800; transform:scale(1); }
  50%{ text-shadow: 0 0 20px #FFD700, 0 0 55px #FFD700, 0 0 100px #ff8800; transform:scale(1.04); }
}
.victory-subtitle {
  font-size: clamp(14px, 2.2vw, 22px); letter-spacing:5px;
  color: rgba(255,220,100,0.7); margin-bottom:20px; font-weight:300; text-transform:uppercase;
}
.victory-info {
  font-size: 18px; color: rgba(180,220,255,0.85); margin-bottom:36px; text-align:center;
  line-height: 2;
}
.victory-info .vball {
  display:inline-block; width:22px; height:22px; border-radius:50%;
  vertical-align:middle; margin:0 6px; box-shadow: 0 0 12px currentColor;
}
.victory-btn {
  width:260px; padding:15px 0;
  background: rgba(5,10,25,0.75);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,220,100,0.4);
  border-radius:14px;
  color: #FFD700; font-size:18px; font-weight:700; letter-spacing:3px;
  cursor:pointer; transition:all 0.25s ease;
  box-shadow: 0 4px 32px rgba(255,180,0,0.2), inset 0 1px 0 rgba(255,255,255,0.07);
  margin: 0 10px;
}
.victory-btn:hover {
  transform:scale(1.06);
  border-color: rgba(255,220,100,0.7);
  box-shadow: 0 4px 48px rgba(255,180,0,0.45), inset 0 1px 0 rgba(255,255,255,0.1);
  color:#fff;
}
.victory-btn:active { transform:scale(0.97); }
.victory-btn.secondary { color: rgba(200,220,255,0.7); border-color: rgba(100,180,255,0.3); }
.victory-btn.secondary:hover { color:#e8f4ff; border-color:rgba(0,212,255,0.5); box-shadow: 0 4px 40px rgba(0,212,255,0.25); }

/* 礼花粒子画布 */
#fireworks-canvas {
  position:fixed; inset:0; z-index:590; pointer-events:none;
  opacity:0; transition:opacity 0.5s;
}
#fireworks-canvas.show { opacity:1; }

/* ── 顶部状态栏 ── */
#hud-top {
  top:16px; left:50%; transform:translateX(-50%);
  padding: 10px 28px;
  display:flex; align-items:center; gap:28px;
  font-size:15px; white-space:nowrap;
}
.hud-stat { text-align:center; }
.hud-stat .label { font-size:10px; color:rgba(100,180,255,0.7); letter-spacing:1.5px; text-transform:uppercase; }
.hud-stat .value { font-size:22px; font-weight:800; color:#7df; letter-spacing:1px; }
.hud-sep { width:1px; height:36px; background:rgba(100,200,255,0.2); }

/* ── 右上合成UI ── */
#hud-fusion {
  top:16px; right:16px;
  padding:14px 18px; min-width:200px;
}
.fusion-label { font-size:10px; color:rgba(100,200,255,0.65); letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; }
#fusion-preview { display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:8px; }
.fp-ball { border-radius:50%; box-shadow:0 0 8px currentColor; flex-shrink:0; }
.fp-arrow { color:#FFD700; font-size:20px; font-weight:900; text-shadow:0 0 8px #FFD700; }
.fp-result { border-radius:50%; box-shadow:0 0 14px currentColor; flex-shrink:0; }
#combo-display { font-size:26px; font-weight:900; min-height:34px; text-align:center; letter-spacing:1px; transition:color 0.2s; }
#ball-info { font-size:11px; color:rgba(140,190,255,0.7); margin-top:6px; text-align:center; }

/* ── 速度计 ── */
#hud-speed {
  bottom:20px; left:50%; transform:translateX(-50%);
  padding:10px 24px; display:flex; align-items:center; gap:12px;
}
#speed-bar-bg { width:160px; height:6px; background:rgba(255,255,255,0.1); border-radius:3px; overflow:hidden; }
#speed-bar { height:100%; border-radius:3px; background:linear-gradient(90deg,#00e5ff,#7c4dff); width:0%; transition:width 0.3s; box-shadow:0 0 8px #00e5ff; }
#speed-label { font-size:11px; color:rgba(100,200,255,0.7); letter-spacing:1px; }
#speed-val { font-size:16px; font-weight:800; color:#00e5ff; min-width:40px; text-align:right; }

/* ── 能量条 ↓新增 ── */
#hud-energy {
  bottom:60px; left:50%; transform:translateX(-50%);
  padding:8px 20px; display:flex; align-items:center; gap:10px;
}
#energy-icon { font-size:16px; filter:drop-shadow(0 0 4px #7c4dff); }
#energy-bar-bg { width:200px; height:10px; background:rgba(255,255,255,0.08); border-radius:5px; overflow:hidden; position:relative; }
#energy-bar-fill { height:100%; border-radius:5px; background:linear-gradient(90deg,#7c4dff,#00e5ff); width:0%; transition:width 0.25s; box-shadow:0 0 10px #7c4dff; position:relative; }
#energy-bar-fill.full { background:linear-gradient(90deg,#ff4444,#ffcc00,#00ff88,#00e5ff,#7c4dff); background-size:300% 100%; animation:energyRainbow 2s linear infinite; }
@keyframes energyRainbow { 0%{background-position:0% 50%} 100%{background-position:300% 50%} }
#energy-val { font-size:13px; font-weight:700; color:#b388ff; min-width:32px; text-align:right; }

/* ── 攻击冷却 ↓新增 ── */
#hud-atk {
  bottom:100px; left:50%; transform:translateX(-50%);
  padding:6px 14px; display:flex; align-items:center; gap:14px;
}
.atk-slot { position:relative; width:36px; height:36px; border-radius:8px; background:rgba(10,15,30,0.7); border:1.5px solid rgba(100,200,255,0.25); display:flex; align-items:center; justify-content:center; font-size:15px; overflow:hidden; }
.atk-slot .atk-icon { z-index:2; text-shadow:0 0 6px currentColor; }
.atk-slot .atk-cd-overlay { position:absolute; bottom:0; left:0; width:100%; background:rgba(0,0,0,0.65); z-index:1; transition:height 0.15s; }
.atk-slot .atk-key { position:absolute; bottom:-1px; right:2px; font-size:8px; color:rgba(160,210,255,0.6); z-index:3; font-weight:700; letter-spacing:0.5px; }
.atk-slot.ready { border-color:rgba(0,212,255,0.6); box-shadow:0 0 8px rgba(0,212,255,0.3); }
.atk-slot.active { border-color:rgba(255,200,0,0.8); box-shadow:0 0 12px rgba(255,200,0,0.5); }

/* ── 阶段横幅 ── */
#phase-banner {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  z-index:300; pointer-events:none;
  font-size:38px; font-weight:900; letter-spacing:4px;
  text-shadow:0 0 30px currentColor;
  opacity:0; transition:opacity 0.4s;
}

/* ── 开始界面 ── */
#start-screen {
  position:fixed; inset:0; z-index:500;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:radial-gradient(ellipse at 50% 40%, #0a1830 0%, #020810 70%);
  transition: opacity 0.6s ease, visibility 0.6s;
}
#start-screen.hidden { opacity:0; visibility:hidden; pointer-events:none; }

/* LOGO */
.start-logo {
  font-size:clamp(48px,8vw,96px); font-weight:900; letter-spacing:12px;
  color:#fff; margin-bottom:12px; user-select:none;
  text-shadow:
    0 0 10px #00d4ff,
    0 0 30px #00d4ff,
    0 0 60px #0077ff,
    0 0 100px #003399;
  animation: logoPulse 3s ease-in-out infinite;
}
.start-subtitle {
  font-size:clamp(14px,2vw,20px); letter-spacing:6px;
  color:rgba(0,212,255,0.55); margin-bottom:48px; font-weight:300;
  text-transform:uppercase;
}
@keyframes logoPulse {
  0%,100%{ text-shadow:0 0 10px #00d4ff,0 0 30px #00d4ff,0 0 60px #0077ff,0 0 100px #003399; }
  50%{ text-shadow:0 0 16px #00d4ff,0 0 42px #00d4ff,0 0 80px #0077ff,0 0 130px #003399; }
}

/* 菜单按钮 */
.start-menu { display:flex; flex-direction:column; gap:16px; align-items:center; }
.start-btn {
  width:280px; padding:14px 0;
  background:rgba(5,10,25,0.72);
  backdrop-filter:blur(12px);
  border:1px solid rgba(100,200,255,0.18);
  border-radius:14px;
  color:#e8f4ff; font-size:18px; font-weight:600; letter-spacing:2px;
  cursor:pointer; transition:all 0.25s ease;
  box-shadow:0 4px 32px rgba(0,120,255,0.15), inset 0 1px 0 rgba(255,255,255,0.06);
  position:relative; overflow:hidden;
}
.start-btn:hover {
  transform:scale(1.05);
  border-color:rgba(0,212,255,0.5);
  box-shadow:0 4px 40px rgba(0,212,255,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
  color:#00d4ff;
}
.start-btn:active { transform:scale(0.97); }
.start-btn::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(90deg,transparent,rgba(0,212,255,0.08),transparent);
  transform:translateX(-100%);
  transition:transform 0.5s;
}
.start-btn:hover::after { transform:translateX(100%); }

/* 难度选择 */
.diff-row {
  display:flex; gap:10px; margin-top:8px; justify-content:center;
}
.diff-btn {
  padding:8px 20px; border-radius:10px;
  background:rgba(5,10,25,0.6);
  backdrop-filter:blur(8px);
  border:1px solid rgba(100,200,255,0.12);
  color:rgba(200,220,255,0.7); font-size:14px; font-weight:600;
  cursor:pointer; transition:all 0.2s;
}
.diff-btn:hover { border-color:rgba(0,212,255,0.4); color:#e8f4ff; }
.diff-btn.active {
  border-color:#00d4ff; color:#00d4ff;
  box-shadow:0 0 16px rgba(0,212,255,0.25);
  background:rgba(0,60,120,0.3);
}

/* 设置面板 */
#settings-panel {
  margin-top:20px; padding:20px 28px;
  background:rgba(5,10,25,0.85);
  backdrop-filter:blur(16px);
  border:1px solid rgba(100,200,255,0.2);
  border-radius:16px;
  display:none; min-width:300px;
  box-shadow:0 8px 48px rgba(0,100,255,0.2);
}
#settings-panel.show { display:block; }
.settings-row {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px;
}
.settings-row:last-child { margin-bottom:0; }
.settings-label { color:rgba(160,210,255,0.85); font-size:14px; font-weight:500; }
.settings-val { color:#00d4ff; font-size:13px; min-width:36px; text-align:right; }
input[type=range] {
  -webkit-appearance:none; appearance:none;
  width:140px; height:5px; border-radius:3px;
  background:rgba(0,212,255,0.15); outline:none;
  margin:0 10px;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; appearance:none;
  width:16px; height:16px; border-radius:50%;
  background:#00d4ff; cursor:pointer;
  box-shadow:0 0 8px rgba(0,212,255,0.5);
}

/* ── 关卡选择界面 ── */
#level-select-screen {
  position:fixed; inset:0; z-index:510;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:radial-gradient(ellipse at 50% 40%, #060f22 0%, #020810 70%);
  opacity:0; visibility:hidden; pointer-events:none;
  transition: opacity 0.45s ease, visibility 0.45s;
  overflow-y:auto;
  padding:28px 0;
}
#level-select-screen.show { opacity:1; visibility:visible; pointer-events:auto; }

.ls-title {
  font-size:clamp(24px,4vw,44px); font-weight:900; letter-spacing:8px;
  color:#fff; margin-bottom:8px;
  text-shadow:0 0 12px #00d4ff, 0 0 36px #0055ff;
}
.ls-subtitle {
  font-size:13px; letter-spacing:4px; color:rgba(0,212,255,0.5);
  text-transform:uppercase; margin-bottom:36px;
}

.ls-grid {
  display:grid; grid-template-columns:repeat(5, 165px); gap:14px;
  padding:0 20px;
}
@media(max-width:950px){
  .ls-grid { grid-template-columns:repeat(3, 165px); }
}
@media(max-width:600px){
  #level-select-screen { justify-content:flex-start; padding:22px 0 34px; }
  .ls-title { letter-spacing:5px; margin-top:2px; }
  .ls-subtitle { margin-bottom:20px; }
  .ls-grid { grid-template-columns:repeat(2, minmax(138px, 150px)); gap:14px; padding:0 16px; }
  .ls-card { padding:18px 12px 15px; }
  #hud-level { top:8px; left:8px; min-width:132px; padding:8px 12px; }
  #hud-level .level-num { font-size:24px; }
  #hud-level .level-goal { font-size:11px; }
  #hud-top {
    top:8px; left:auto; right:8px; transform:none;
    padding:8px 12px; gap:12px; font-size:12px;
  }
  #hud-top .hud-stat .value { font-size:18px; }
  #hud-top .hud-stat .label { font-size:9px; }
  #hud-top .hud-sep { height:28px; }
  #hud-fusion {
    top:88px; left:50%; right:auto; transform:translateX(-50%);
    min-width:198px; max-width:calc(100vw - 32px); padding:10px 14px;
  }
  #combo-display { font-size:22px; min-height:28px; }
  #hud-atk { bottom:112px; gap:10px; padding:5px 10px; }
  #hud-energy { bottom:58px; padding:7px 14px; }
  #energy-bar-bg { width:160px; }
  #hud-speed { bottom:12px; padding:8px 14px; }
  #speed-bar-bg { width:128px; }
}

.ls-card {
  position:relative; padding:22px 16px 18px;
  background:rgba(5,10,25,0.78);
  backdrop-filter:blur(14px);
  border:1px solid rgba(100,200,255,0.15);
  border-radius:16px; cursor:pointer;
  transition:all 0.22s ease;
  box-shadow:0 4px 24px rgba(0,80,200,0.12);
  text-align:center; overflow:hidden;
  user-select:none;
}
.ls-card:hover {
  transform:translateY(-4px) scale(1.03);
  box-shadow:0 8px 36px rgba(0,150,255,0.28);
}
.ls-card:active { transform:scale(0.97); }
.ls-card.locked {
  opacity:0.38; cursor:not-allowed; filter:grayscale(0.7);
}
.ls-card.locked:hover { transform:none; }

/* 关卡编号 */
.ls-num {
  font-size:32px; font-weight:900; line-height:1;
  color:rgba(255,255,255,0.15); letter-spacing:2px; margin-bottom:10px;
}
/* 目标球预览 */
.ls-ball-preview {
  width:44px; height:44px; border-radius:50%;
  margin:0 auto 10px; display:block;
  box-shadow:0 0 18px var(--bc,#fff);
}
/* 关卡名 */
.ls-name {
  font-size:13px; font-weight:700; letter-spacing:2px;
  color:rgba(220,240,255,0.88); margin-bottom:4px;
}
/* 目标球名称 */
.ls-goal {
  font-size:11px; color:rgba(160,200,255,0.55); letter-spacing:1px;
}
/* 障碍物标签 */
.ls-tags {
  display:flex; flex-wrap:wrap; justify-content:center; gap:5px; margin-top:10px;
}
.ls-tag {
  font-size:10px; padding:2px 8px; border-radius:20px;
  border:1px solid rgba(255,255,255,0.12);
  color:rgba(200,230,255,0.65); letter-spacing:0.5px;
}
.ls-tag.danger { border-color:rgba(255,80,80,0.35); color:rgba(255,130,130,0.75); }
.ls-tag.star   { border-color:rgba(255,210,0,0.4); color:rgba(255,220,80,0.8); }

/* 关卡卡片边框颜色按主题 */
.ls-card[data-stage="1"]{ border-color:rgba(60,200,80,0.3); }
.ls-card[data-stage="1"]:hover{ border-color:rgba(60,200,80,0.6); box-shadow:0 8px 36px rgba(40,200,60,0.25); }
.ls-card[data-stage="2"]{ border-color:rgba(0,150,255,0.3); }
.ls-card[data-stage="2"]:hover{ border-color:rgba(0,150,255,0.65); box-shadow:0 8px 36px rgba(0,130,255,0.28); }
.ls-card[data-stage="3"]{ border-color:rgba(160,80,255,0.35); }
.ls-card[data-stage="3"]:hover{ border-color:rgba(160,80,255,0.65); box-shadow:0 8px 36px rgba(140,60,255,0.28); }
.ls-card[data-stage="4"]{ border-color:rgba(255,130,0,0.35); }
.ls-card[data-stage="4"]:hover{ border-color:rgba(255,130,0,0.65); box-shadow:0 8px 36px rgba(255,110,0,0.28); }
.ls-card[data-stage="5"]{ border-color:rgba(255,200,0,0.35); }
.ls-card[data-stage="5"]:hover{ border-color:rgba(255,200,0,0.65); box-shadow:0 8px 36px rgba(255,190,0,0.28); }
.ls-card[data-stage="6"]{ border-color:rgba(255,60,60,0.35); }
.ls-card[data-stage="6"]:hover{ border-color:rgba(255,60,60,0.65); box-shadow:0 8px 36px rgba(255,40,40,0.28); }

.ls-back-btn {
  margin-top:28px; padding:10px 40px;
  background:rgba(5,10,25,0.6); backdrop-filter:blur(10px);
  border:1px solid rgba(100,200,255,0.18); border-radius:12px;
  color:rgba(160,210,255,0.7); font-size:14px; letter-spacing:2px;
  cursor:pointer; transition:all 0.2s;
}
.ls-back-btn:hover { color:#e8f4ff; border-color:rgba(0,212,255,0.45); }
</style>
</head>
<body>

<!-- ── 开始界面 ── -->
<div id="start-screen">
  <div class="start-logo">BALL FUSION</div>
  <div class="start-subtitle">Neon Rush</div>

  <div class="start-menu">
    <button class="start-btn" id="btn-start">▶ &nbsp;开 始 游 戏</button>

    <button class="start-btn" id="btn-diff">🎯 &nbsp;难度选择</button>
    <div class="diff-row" id="diff-row" style="display:none;">
      <button class="diff-btn" data-diff="easy">简 单</button>
      <button class="diff-btn active" data-diff="normal">普 通</button>
      <button class="diff-btn" data-diff="hard">困 难</button>
    </div>

    <button class="start-btn" id="btn-settings">⚙ &nbsp;设 置</button>
  </div>

  <div id="settings-panel">
    <div class="settings-row">
      <span class="settings-label">🔊 音效</span>
      <input type="range" id="vol-sfx" min="0" max="100" value="80">
      <span class="settings-val" id="vol-sfx-val">80</span>
    </div>
    <div class="settings-row">
      <span class="settings-label">🎵 音乐</span>
      <input type="range" id="vol-music" min="0" max="100" value="60">
      <span class="settings-val" id="vol-music-val">60</span>
    </div>
  </div>
</div>

<!-- ── 关卡选择界面 ── -->
<div id="level-select-screen">
  <div class="ls-title">SELECT LEVEL</div>
  <div class="ls-subtitle">选择你的关卡</div>
  <div class="ls-grid" id="ls-grid">
    <!-- 由JS动态生成 -->
  </div>
  <button class="ls-back-btn" id="ls-back">← 返回主菜单</button>
</div>

<!-- 左上关卡信息（游戏开始后显示） -->
<div id="hud-level" class="hud-card" style="display:none;">
  <div class="level-title">关 卡</div>
  <div class="level-num" id="v-level">1</div>
  <div class="level-goal">目标：<span id="level-goal-ball" class="level-goal-ball"></span><span id="level-goal-name">—</span></div>
</div>

<!-- 礼花画布 -->
<canvas id="fireworks-canvas"></canvas>

<!-- 胜利界面 -->
<div id="victory-screen">
  <div class="victory-title" id="victory-title">LEVEL CLEAR!</div>
  <div class="victory-subtitle" id="victory-subtitle">合成成功</div>
  <div class="victory-info" id="victory-info"></div>
  <div style="display:flex;gap:16px;margin-top:8px;">
    <button class="victory-btn" id="btn-next-level">▶ &nbsp;下一关</button>
    <button class="victory-btn secondary" id="btn-restart-level">↺ &nbsp;重新开始</button>
  </div>
</div>

<!-- 顶部状态 -->
<div id="hud-top" class="hud-card" style="display:none;">
  <div class="hud-stat"><div class="label">距离</div><div class="value" id="v-dist">0</div></div>
  <div class="hud-sep"></div>
  <div class="hud-stat"><div class="label">分数</div><div class="value" id="v-score">0</div></div>
  <div class="hud-sep"></div>
  <div class="hud-stat"><div class="label">球队</div><div class="value" id="v-balls">3</div></div>
</div>

<!-- 右上合成UI -->
<div id="hud-fusion" class="hud-card" style="display:none;">
  <div class="fusion-label">⚡ 合成系统</div>
  <div id="fusion-preview">
    <div class="fp-ball" id="fp1" style="width:18px;height:18px;"></div>
    <div class="fp-ball" id="fp2" style="width:18px;height:18px;"></div>
    <div class="fp-ball" id="fp3" style="width:18px;height:18px;"></div>
    <div class="fp-arrow">→</div>
    <div class="fp-result" id="fp-res" style="width:28px;height:28px;"></div>
  </div>
  <div id="combo-display"></div>
  <div id="ball-info">—</div>
</div>

<!-- 速度计 -->
<div id="hud-speed" class="hud-card" style="display:none;">
  <div id="speed-label">SPEED</div>
  <div id="speed-bar-bg"><div id="speed-bar"></div></div>
  <div id="speed-val">0</div>
</div>

<!-- 能量条 ↓新增 -->
<div id="hud-energy" class="hud-card" style="display:none;">
  <div id="energy-icon">⚡</div>
  <div id="energy-bar-bg"><div id="energy-bar-fill"></div></div>
  <div id="energy-val">0</div>
</div>

<!-- 攻击冷却 ↓新增 -->
<div id="hud-atk" class="hud-card" style="display:none;">
  <div class="atk-slot ready" id="atk-dash"><span class="atk-icon" style="color:#00e5ff">⚡</span><div class="atk-cd-overlay" style="height:0%"></div><span class="atk-key">Q</span></div>
  <div class="atk-slot ready" id="atk-slam"><span class="atk-icon" style="color:#ff6600">💥</span><div class="atk-cd-overlay" style="height:0%"></div><span class="atk-key">W</span></div>
  <div class="atk-slot ready" id="atk-spin"><span class="atk-icon" style="color:#aa44ff">🌀</span><div class="atk-cd-overlay" style="height:0%"></div><span class="atk-key">E</span></div>
  <div class="atk-slot" id="atk-blast"><span class="atk-icon" style="color:#ff4444">🔥</span><div class="atk-cd-overlay" style="height:0%"></div><span class="atk-key">R</span></div>
</div>

<!-- 磁力状态 ↓新增 -->
<div id="hud-magnet" style="display:none;position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,200,255,0.15);border:1px solid rgba(0,200,255,0.5);border-radius:12px;padding:6px 16px;z-index:160;pointer-events:none;">
  <span style="font-size:16px;">🧲</span>
  <span id="magnet-timer" style="color:#00ccff;font-weight:700;font-size:14px;margin-left:4px;">0s</span>
</div>

// ── 天空 ──
let skyTexture = null;  // 全局引用，用于动态更新
let skyCanvas = null;

function buildSky(){
  const skyGeo = new THREE.SphereGeometry(400, 32, 16);
  skyCanvas = document.createElement('canvas');
  skyCanvas.width = 2; skyCanvas.height = 256;
  const sc = skyCanvas.getContext('2d');
  _drawSkyGradient(sc, ['#000510','#020a1e','#050f2e','#0a1440'], [0, 0.4, 0.75, 1]);
  skyTexture = new THREE.CanvasTexture(skyCanvas);
  const skyMat = new THREE.MeshBasicMaterial({ map:skyTexture, side:THREE.BackSide });
  scene.add(new THREE.Mesh(skyGeo, skyMat));

  const starCount = 800;
  const starPos = new Float32Array(starCount*3);
  for(let i=0;i<starCount;i++){
    const theta = Math.random()*Math.PI*2;
    const phi   = Math.acos(2*Math.random()-1);
    const r = 380;
    starPos[i*3]   = r*Math.sin(phi)*Math.cos(theta);
    starPos[i*3+1] = r*Math.cos(phi);
    starPos[i*3+2] = r*Math.sin(phi)*Math.sin(theta);
  }
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff, size:1.2, sizeAttenuation:true})));
}

function _drawSkyGradient(ctx2d, colors, stops){
  const grad = ctx2d.createLinearGradient(0,0,0,256);
  for(let i=0;i<colors.length;i++) grad.addColorStop(stops[i], colors[i]);
  ctx2d.fillStyle = grad;
  ctx2d.fillRect(0,0,2,256);
}

function setSkyColors(colors, stops, fogColor, ambientColor, moonColor){
  if(!skyCanvas || !skyTexture) return;
  const sc = skyCanvas.getContext('2d');
  _drawSkyGradient(sc, colors, stops);
  skyTexture.needsUpdate = true;
  // 更新雾气颜色
  scene.fog.color.setHex(fogColor);
  // 更新环境光
  scene.children.forEach(obj=>{
    if(obj.isAmbientLight) obj.color.setHex(ambientColor);
  });
  // 更新月光
  moonLight.color.setHex(moonColor);
}
buildSky();

// 护栏发光带（用半透明长条Mesh增加厚度感）
const RAIL_STRIP_COUNT = 24;  // 发光带段数
const RAIL_STRIP_LEN = RAIL_SPAN / RAIL_STRIP_COUNT;
const railStripsL = [];
const railStripsR = [];
const railStripMat = new THREE.MeshStandardMaterial({
  color: 0x00d4ff, emissive: 0x00d4ff, emissiveIntensity: 3.0,
  transparent: true, opacity: 0.8, roughness: 0, metalness: 1
});
const railStripGeo = new THREE.BoxGeometry(0.25, 0.6, RAIL_STRIP_LEN + 2);
for(let i = 0; i < RAIL_STRIP_COUNT; i++){
  const sl = new THREE.Mesh(railStripGeo, railStripMat.clone());
  const sr = new THREE.Mesh(railStripGeo, railStripMat.clone());
  scene.add(sl); scene.add(sr);
  railStripsL.push(sl);
  railStripsR.push(sr);
}

function updateGlobalRails(){
  const segLen = RAIL_SPAN / RAIL_SEGMENTS;
  // 护栏范围：球前方 RAIL_SPAN*0.8，后方 RAIL_SPAN*0.2
  const startZ = worldOffset - RAIL_SPAN * 0.2;
  
  for(let i = 0; i < RAIL_SEGMENTS; i++){
    const z = startZ + i * segLen;
    const ci = Math.floor(z / CFG.chunkLen);
    const props = getChunkProps(ci);
    const themeIdx = getThemeIndex(ci);
    const hw = props.width / 2;
    // 弯曲偏移：z 越远偏移越大
    const bendOff = props.bendAngle * (i - RAIL_SEGMENTS * 0.2) * segLen * 0.3;
    const elevOff = props.elevation;
    
    railPositionsL[i*3]   = -hw + bendOff;
    railPositionsL[i*3+1] = 0.3 + elevOff;
    railPositionsL[i*3+2] = worldOffset - z;
    
    railPositionsR[i*3]   = hw + bendOff;
    railPositionsR[i*3+1] = 0.3 + elevOff;
    railPositionsR[i*3+2] = worldOffset - z;
  }
  railGeoL.attributes.position.needsUpdate = true;
  railGeoR.attributes.position.needsUpdate = true;
  
  // 更新发光带位置
  const stripSegLen = RAIL_SPAN / RAIL_STRIP_COUNT;
  for(let i = 0; i < RAIL_STRIP_COUNT; i++){
    const midZ = startZ + (i + 0.5) * stripSegLen;
    const ci = Math.floor(midZ / CFG.chunkLen);
    const props = getChunkProps(ci);
    const themeIdx = getThemeIndex(ci);
    const hw = props.width / 2;
    const bendOff = props.bendAngle * ((i + 0.5) / RAIL_STRIP_COUNT - 0.2) * RAIL_SPAN * 0.3;
    const elevOff = props.elevation;
    const screenZ = worldOffset - midZ;
    
    railStripsL[i].position.set(-hw + bendOff, 0.3 + elevOff, screenZ);
    railStripsL[i].rotation.y = props.bendAngle * 0.3;
    railStripsR[i].position.set(hw + bendOff, 0.3 + elevOff, screenZ);
    railStripsR[i].rotation.y = props.bendAngle * 0.3;
    
    // 主题色跟随
    const tc = CFG.themeColors[themeIdx];
    if(railStripsL[i].material.color.getHex() !== tc.neon){
      railStripsL[i].material.color.setHex(tc.neon);
      railStripsL[i].material.emissive.setHex(tc.neon);
      railStripsR[i].material.color.setHex(tc.neon);
      railStripsR[i].material.emissive.setHex(tc.neon);
    }
    const speedGlow = clamp01(gs.currentSpeedPS / Math.max(1, CFG.maxSpeedPS));
    const pulse = 0.5 + Math.sin(gs.gameTime*12 + i*0.7)*0.5;
    const railOpacity = Math.min(0.95, 0.58 + speedGlow*0.28 + pulse*0.08);
    const railIntensity = 2.7 + speedGlow*2.4 + pulse*0.6;
    railStripsL[i].material.opacity = railOpacity;
    railStripsR[i].material.opacity = railOpacity;
    railStripsL[i].material.emissiveIntensity = railIntensity;
    railStripsR[i].material.emissiveIntensity = railIntensity;
  }
}

// ↓新增：伪随机数生成器（保证每个chunk的属性固定，不随帧变化）
function seededRandom(seed){
  let s = seed % 2147483647;
  if(s<=0) s += 2147483646;
  s = s * 16807 % 2147483647;
  return (s-1) / 2147483646;
}

// ↓新增：为每个chunk生成独立的轨道属性
function getChunkProps(ci){
  // ↓修改：弯道连贯化——每3~5个chunk为一组，同组弯道方向一致
  const groupLen = 3 + Math.floor(seededRandom(Math.floor(ci / 4) * 7919) * 3); // 3~5个chunk一组
  const groupId = Math.floor(ci / groupLen);
  const groupDir = seededRandom(groupId * 6271 + 1) < 0.5 ? -1 : 1; // 整组方向
  const groupIntensity = seededRandom(groupId * 4217 + 2); // 整组强度
  // 在组内，弯道角度从中到强再到中（抛物线分布）
  const inGroupPos = (ci % groupLen) / Math.max(1, groupLen - 1); // 0~1
  const bendEnvelope = 4 * inGroupPos * (1 - inGroupPos); // 0→1→0 抛物线
  const bendAngle = groupDir * groupIntensity * CFG.bendMaxAngle * bendEnvelope * (gs.phase >= 2 ? 1 : 0.4);

  const r3 = seededRandom(ci * 4217 + 3);
  const r4 = seededRandom(ci * 3571 + 4);
  const r5 = seededRandom(ci * 2833 + 5);
  // 起伏高度
  const elevation = CFG.elevationRange[0] + r3 * (CFG.elevationRange[1] - CFG.elevationRange[0]);
  // 宽度变化
  const width = CFG.widthRange[0] + r4 * (CFG.widthRange[1] - CFG.widthRange[0]);
  // Z轴旋转倾斜
  const tiltAngle = (r5 < 0.5 ? -1 : 1) * seededRandom(ci*1949+6) * CFG.tiltMaxAngle * (gs.phase >= 2 ? 1 : 0.3);
  return { bendAngle, elevation, width, tiltAngle, groupDir };
}

// ↓新增：主题色索引
function getThemeIndex(ci){
  const raw = Math.floor(ci / Math.round(CFG.themeSwitchDist / CFG.chunkLen)) % CFG.themeColors.length;
  return ((raw % CFG.themeColors.length) + CFG.themeColors.length) % CFG.themeColors.length;  // 保证非负
}

// ↓新增：流光地面材质生成器（每chunk可独立着色+流光）
function makeFlowGroundMat(themeIdx, ci){
  const tc = CFG.themeColors[themeIdx];
  const c = document.createElement('canvas');
  c.width = 256; c.height = 256;
  const x = c.getContext('2d');
  // 主色背景
  x.fillStyle = `#${tc.ground.toString(16).padStart(6,'0')}`;
  x.fillRect(0,0,256,256);
  // 网格线
  x.strokeStyle = `#${tc.neon.toString(16).padStart(6,'0')}30`;
  x.lineWidth = 0.5;
  for(let i=0;i<256;i+=32){
    x.beginPath(); x.moveTo(i,0); x.lineTo(i,256); x.stroke();
    x.beginPath(); x.moveTo(0,i); x.lineTo(256,i); x.stroke();
  }
  // ↓新增：中心流光线（沿Z方向流动的霓虹线）
  x.strokeStyle = `#${tc.neon.toString(16).padStart(6,'0')}60`;
  x.lineWidth = 2;
  x.beginPath(); x.moveTo(128,0); x.lineTo(128,256); x.stroke();
  // 两侧辅助流光线
  x.strokeStyle = `#${tc.neon.toString(16).padStart(6,'0')}28`;
  x.lineWidth = 1;
  x.beginPath(); x.moveTo(96,0); x.lineTo(96,256); x.stroke();
  x.beginPath(); x.moveTo(160,0); x.lineTo(160,256); x.stroke();
  // ↓新增：车道虚线（公路感）
  x.strokeStyle = `#${tc.neon.toString(16).padStart(6,'0')}40`;
  x.lineWidth = 1.5;
  x.setLineDash([12, 18]); // 虚线
  // 左车道线
  x.beginPath(); x.moveTo(112,0); x.lineTo(112,256); x.stroke();
  // 右车道线
  x.beginPath(); x.moveTo(144,0); x.lineTo(144,256); x.stroke();
  x.setLineDash([]); // 恢复实线

  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(1, CFG.chunkLen/4);
  // ↓新增：存储tex引用以便后续更新流光offset
  const mat = new THREE.MeshStandardMaterial({ map:tex, roughness:0.9, metalness:0.05, emissive:tc.neon, emissiveIntensity:0.05 });
  return { mat, tex };
}

function makeSideMat(){
  const c = document.createElement('canvas');
  c.width = 64; c.height = 64;
  const x = c.getContext('2d');
  x.fillStyle = '#030812';
  x.fillRect(0,0,64,64);
  x.strokeStyle = 'rgba(0,180,255,0.08)';
  x.lineWidth = 0.5;
  for(let i=0;i<64;i+=16){ x.beginPath(); x.moveTo(i,0); x.lineTo(i,64); x.stroke(); }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(2, CFG.chunkLen/4);
  return new THREE.MeshStandardMaterial({ map:tex, roughness:0.95, metalness:0.0 });
}
const sideMat = makeSideMat();

// ↓新增：发光板装饰（轨道两侧的霓虹装饰面板）
function makeGlowPanel(x, z, themeIdx, side){
  const tc = CFG.themeColors[themeIdx];
  const grp = new THREE.Group();
  const panelH = 2 + Math.random() * 3;
  const panelW = 0.8 + Math.random() * 1.5;
  const panel = new THREE.Mesh(
    new THREE.PlaneGeometry(panelW, panelH),
    new THREE.MeshStandardMaterial({
      color:tc.neon, emissive:tc.neon, emissiveIntensity:2.0 + Math.random(),
      roughness:0, metalness:0.5, transparent:true, opacity:0.5 + Math.random()*0.3,
    })
  );
  panel.position.y = panelH/2;
  // 面板朝向轨道内侧
  panel.rotation.y = side < 0 ? Math.PI/2 : -Math.PI/2;
  grp.add(panel);
  grp.position.set(x, -0.5, z);
  return grp;
}

// ↓新增：灯柱生成器（适配主题色）
function makeLampPost(x, z, themeIdx){
  const tc = CFG.themeColors[themeIdx];
  const grp = new THREE.Group();
  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08,0.08,4,8),
    new THREE.MeshStandardMaterial({ color:0x223344, roughness:0.5, metalness:0.8 })
  );
  pole.position.y = 2;
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.25,8,8),
    new THREE.MeshStandardMaterial({ color:tc.neon, emissive:tc.neon, emissiveIntensity:3 })
  );
  head.position.y = 4.3;
  grp.add(pole); grp.add(head);
  grp.position.set(x, -0.5, z);
  grp.castShadow = true;
  return grp;
}

// ↓新增：边缘粒子光带（每chunk两侧各一组粒子）
function makeEdgeParticles(x, width, themeIdx){
  const tc = CFG.themeColors[themeIdx];
  const count = CFG.trailParticleCount;
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  const c = new THREE.Color(tc.neon);
  for(let i=0;i<count;i++){
    positions[i*3]   = (Math.random()-0.5) * CFG.trailSpread;
    positions[i*3+1] = Math.random() * 3;
    positions[i*3+2] = (Math.random()-0.5) * CFG.chunkLen;
    colors[i*3]   = c.r;
    colors[i*3+1] = c.g;
    colors[i*3+2] = c.b;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors,3));
  const mat = new THREE.PointsMaterial({
    size:0.4, vertexColors:true, transparent:true, opacity:0.7,
    blending:THREE.AdditiveBlending, depthWrite:false,
  });
  return new THREE.Points(geo, mat);
}

function getChunkScreenZ(ci){
  return worldOffset - ci * CFG.chunkLen;
}

// ↓修改：createChunk全面升级——独立属性+流光+粒子+主题色
function createChunk(ci){
  const key = `${ci}`;
  if(chunks[key]) return;
  const sz = getChunkScreenZ(ci);
  const props = getChunkProps(ci);
  const themeIdx = getThemeIndex(ci);

  const group = new THREE.Group();
  group.position.set(0, 0, sz);
  scene.add(group);

  // 地面（宽度随chunk变化）↓修改
  const w = props.width;
  const { mat:groundMatInst, tex:groundTex } = makeFlowGroundMat(themeIdx, ci);
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(w, CFG.chunkLen), groundMatInst);
  ground.rotation.x = -Math.PI/2;
  ground.position.set(0, -0.5, 0);
  ground.receiveShadow = true;
  group.add(ground);

  // 侧面 ↓修改：适配动态宽度 + 增加护栏高度
  const sideW = 60;
  const sideL = new THREE.Mesh(new THREE.PlaneGeometry(sideW, CFG.chunkLen), sideMat);
  sideL.rotation.x = -Math.PI/2;
  sideL.position.set(-(w/2 + sideW/2), -0.52, 0);
  group.add(sideL);
  const sideR = new THREE.Mesh(new THREE.PlaneGeometry(sideW, CFG.chunkLen), sideMat);
  sideR.rotation.x = -Math.PI/2;
  sideR.position.set(w/2 + sideW/2, -0.52, 0);
  group.add(sideR);

  // ↓修改：护栏墙体降低透明度（全局护栏接管连续视觉）
  const wallH = 3.5;
  const wallMat = new THREE.MeshStandardMaterial({
    color: CFG.themeColors[themeIdx].ground, emissive: CFG.themeColors[themeIdx].neon,
    emissiveIntensity: 0.15, transparent: true, opacity: 0.15, roughness: 0.6, metalness: 0.4,
  });
  const wallGeo = new THREE.BoxGeometry(0.4, wallH, CFG.chunkLen + 4);
  const wallL = new THREE.Mesh(wallGeo, wallMat);
  wallL.position.set(-w/2 - 0.2, wallH/2 - 0.5, 0);
  group.add(wallL);
  const wallR = new THREE.Mesh(wallGeo, wallMat.clone());
  wallR.position.set(w/2 + 0.2, wallH/2 - 0.5, 0);
  group.add(wallR);

  // ↓修改：局部霓虹光带降低亮度（全局护栏接管）
  const stripH = 0.35;
  const stripGeoL = new THREE.BoxGeometry(stripH, 0.5, CFG.chunkLen + 4);
  const stripGeoR = new THREE.BoxGeometry(stripH, 0.5, CFG.chunkLen + 4);
  const lStrip = new THREE.Mesh(stripGeoL, makeNeonBorderMat(themeIdx));
  lStrip.position.set(-w/2, 0.25, 0);
  const rStrip = new THREE.Mesh(stripGeoR, makeNeonBorderMat(themeIdx));
  rStrip.position.set(w/2, 0.25, 0);
  group.add(lStrip); group.add(rStrip);

  // ↓新增：地面边缘发光线（地面上的霓虹描边，增强连贯感）
  const edgeLineMat = new THREE.MeshBasicMaterial({ color: CFG.themeColors[themeIdx].neon, transparent:true, opacity:0.6 });
  const edgeLineGeoL = new THREE.PlaneGeometry(0.15, CFG.chunkLen + 4);
  const edgeLineL = new THREE.Mesh(edgeLineGeoL, edgeLineMat);
  edgeLineL.rotation.x = -Math.PI/2;
  edgeLineL.position.set(-w/2 + 0.1, -0.48, 0);
  group.add(edgeLineL);
  const edgeLineGeoR = new THREE.PlaneGeometry(0.15, CFG.chunkLen + 4);
  const edgeLineR = new THREE.Mesh(edgeLineGeoR, edgeLineMat.clone());
  edgeLineR.rotation.x = -Math.PI/2;
  edgeLineR.position.set(w/2 - 0.1, -0.48, 0);
  group.add(edgeLineR);

  // 灯柱 ↓修改：适配动态宽度+主题色
  const lights = [];
  for(let i=0;i<2;i++){
    const zOff = -CFG.chunkLen/2 + (i+0.5)*(CFG.chunkLen/2);
    const lp = makeLampPost(-w/2 - 2.5, zOff, themeIdx);
    const rp = makeLampPost( w/2 + 2.5, zOff, themeIdx);
    group.add(lp); group.add(rp);
    lights.push(lp, rp);
  }

  // ↓新增：发光板装饰（每chunk随机0~3个）
  const decorPanels = [];
  const panelCount = Math.floor(seededRandom(ci*5557+10) * 3);
  for(let p=0;p<panelCount;p++){
    const pz = -CFG.chunkLen/2 + seededRandom(ci*3313+p*17) * CFG.chunkLen;
    const pside = seededRandom(ci*7723+p*31) > 0.5 ? 1 : -1;
    const px = pside * (w/2 + 1 + seededRandom(ci*4421+p*7));
    const panel = makeGlowPanel(px, pz, themeIdx, pside);
    group.add(panel);
    decorPanels.push(panel);
  }

  // ↓新增：边缘粒子光带
  const trailL = makeEdgeParticles(-w/2, w, themeIdx);
  group.add(trailL);
  const trailR = makeEdgeParticles(w/2, w, themeIdx);
  group.add(trailR);

  chunks[key] = {
    ci, group, ground, sideL, sideR, lStrip, rStrip, lights,
    decorPanels, trailL, trailR,
    groundTex,   // ↓新增：流光纹理引用
    props,       // ↓新增：chunk独立属性
    themeIdx,
  };
}

// ↓修改：updateChunks全面升级——动态Y/旋转/弯曲/流光/粒子/节奏
function updateChunks(){
  const curCI = Math.floor(worldOffset / CFG.chunkLen);
  for(let i = -CFG.chunksBehind; i <= CFG.chunksAhead; i++){
    createChunk(curCI + i);
  }

  // ↓新增：节奏节拍检测（用于脉冲效果）
  const beatPhase = (gs.gameTime % CFG.beatInterval) / CFG.beatInterval;
  const beatPulse = Math.pow(Math.max(0, 1 - beatPhase * 4), 2);  // 快速衰减脉冲

  for(const key in chunks){
    const ch = chunks[key];
    const sz = getChunkScreenZ(ch.ci);

    ch.group.position.z = sz;

    // ↓新增：起伏（Y轴偏移）
    const targetY = ch.props.elevation;
    ch.group.position.y += (targetY - ch.group.position.y) * CFG.elevSmoothK;

    // ↓新增：S弯弯曲（group绕Y轴旋转模拟弯曲）
    // 平滑插值到目标弯曲角
    const targetBend = ch.props.bendAngle;
    const curBend = ch.group.rotation.y || 0;
    ch.group.rotation.y += (targetBend - curBend) * CFG.bendSmoothK;

    // ↓新增：Z轴旋转倾斜（神庙逃亡式）
    const targetTilt = ch.props.tiltAngle;
    const curTilt = ch.group.rotation.z || 0;
    // 叠加节奏脉冲
    const tiltWithBeat = targetTilt + beatPulse * 0.03;
    ch.group.rotation.z += (tiltWithBeat - curTilt) * 0.12;

    // ↓新增：流光纹理滚动（UV offset随worldOffset移动）
    if(ch.groundTex){
      const speedRatio = clamp01(gs.currentSpeedPS / Math.max(1, CFG.maxSpeedPS));
      ch.groundTex.offset.y = -(worldOffset * CFG.flowSpeed * (0.035 + speedRatio * 0.055)) % 1;
    }

    // ↓新增：边缘粒子动画（随速度加速喷射）
    if(ch.trailL && ch.trailL.geometry){
      const posArr = ch.trailL.geometry.attributes.position.array;
      const posArrR = ch.trailR.geometry.attributes.position.array;
      const speedRatio = clamp01(gs.currentSpeedPS / Math.max(1, CFG.maxSpeedPS));
      const speedFactor = 1 + gs.currentSpeedPS * 0.14;
      for(let p=0;p<posArr.length;p+=3){
        posArr[p+1] += (0.3 + Math.random()*0.5) * speedFactor * 0.3;
        posArr[p+2] += CFG.trailSpeed * 0.016 * (0.35 + speedRatio * 1.25);
        if(posArr[p+1] > 4){ posArr[p+1] = 0; posArr[p+2] = (Math.random()-0.5)*CFG.chunkLen; }
        posArrR[p+1] += (0.3 + Math.random()*0.5) * speedFactor * 0.3;
        posArrR[p+2] += CFG.trailSpeed * 0.016 * (0.35 + speedRatio * 1.25);
        if(posArrR[p+1] > 4){ posArrR[p+1] = 0; posArrR[p+2] = (Math.random()-0.5)*CFG.chunkLen; }
      }
      ch.trailL.geometry.attributes.position.needsUpdate = true;
      ch.trailR.geometry.attributes.position.needsUpdate = true;
      // 高速时粒子更亮
      const trailOp = Math.min(0.95, 0.5 + speedRatio * 0.45);
      ch.trailL.material.opacity = trailOp;
      ch.trailR.material.opacity = trailOp;
    }

    // ↓新增：节拍脉冲——地面材质emissive强度周期性闪烁
    if(ch.ground && ch.ground.material){
      ch.ground.material.emissiveIntensity = 0.05 + beatPulse * CFG.beatPulseAmp;
    }

    // 回收
    if(ch.ci < curCI - CFG.chunksBehind){
      scene.remove(ch.group);
      if(ch.groundTex) ch.groundTex.dispose();
      if(ch.ground && ch.ground.material) ch.ground.material.dispose();
      delete chunks[key];
    }
  }
}

// ↓新增：获取球脚下chunk的当前有效属性（用于物理适配）
function getCurrentChunkProps(){
  const curCI = Math.floor(worldOffset / CFG.chunkLen);
  const key = `${curCI}`;
  if(chunks[key]){
    const ch = chunks[key];
    return {
      width: ch.props.width,
      elevation: ch.group.position.y || 0,
      bendAngle: ch.group.rotation.y || 0,
      tiltAngle: ch.group.rotation.z || 0,
      themeIdx: ch.themeIdx,
    };
  }
  return { width:CFG.trackWidth, elevation:0, bendAngle:0, tiltAngle:0, themeIdx:0 };
}

function updateFork(){
  if(!forkState.active) return;
  if(forkState._meshes) forkState._meshes.forEach(({mesh,wOff})=>{ mesh.position.z = worldOffset-wOff; });
  if(forkState.signL) forkState.signL.mesh.position.z = worldOffset - forkState.signL.wOff;
  if(forkState.signR) forkState.signR.mesh.position.z = worldOffset - forkState.signR.wOff;
  const leadX = getLeadPos().x;
  if(worldOffset > forkState.forkWOff && worldOffset < forkState.mergeWOff){
    forkState.playerSide = leadX < 0 ? -1 : 1;
  }
  if(worldOffset > forkState.mergeWOff + 30){
    if(forkState._meshes) forkState._meshes.forEach(({mesh})=>scene.remove(mesh));
    if(forkState.signL) scene.remove(forkState.signL.mesh);
    if(forkState.signR) scene.remove(forkState.signR.mesh);
    forkState.active = false; forkState._meshes = null;
    forkState.signL = null; forkState.signR = null;
  }
}

function updateCrossroads(dt){
  // 生成
  if(gs.phase >= 2 && gs.distance > lastCrossDist + CROSSROAD_SPACING){
    spawnCrossroad();
    lastCrossDist = gs.distance;
  }

  for(let i = crossroads.length - 1; i >= 0; i--){
    const cr = crossroads[i];
    const screenZ = worldOffset - cr.wOff;
    cr.group.position.z = screenZ;

    // ↓新增：跟随弯道旋转
    const ci = Math.floor(cr.wOff / CFG.chunkLen);
    const props = getChunkProps(ci);
    cr.group.rotation.y += (props.bendAngle * 0.3 - cr.group.rotation.y) * 0.08;
    cr.group.position.y += (props.elevation - cr.group.position.y) * 0.06;

    // 信号灯循环
    const cycle = (Date.now() * 0.001) % 8; // 8秒一个周期
    for(const tl of cr.trafficLights){
      if(!tl.redLight.material) continue;
      tl.redLight.material.color.setHex(cycle < 3 ? 0xff0000 : 0x330000);
      tl.yellowLight.material.color.setHex((cycle >= 3 && cycle < 4) ? 0xffaa00 : 0x332200);
      tl.greenLight.material.color.setHex(cycle >= 4 ? 0x00ff44 : 0x003300);
    }

    // 横向车流动画（简单的左右移动）
    const carPhase = Math.sin(Date.now() * 0.002) * 15;
    cr.carL.position.x = carPhase;
    cr.carR.position.x = -carPhase;

    // 中心标记旋转
    cr.centerGlow.rotation.z += dt * 0.5;

    // 回收
    if(worldOffset > cr.wOff + 30){
      scene.remove(cr.group);
      crossroads.splice(i, 1);
    }
  }
}

function updateTraps(dt){
  for(let i=traps.length-1;i>=0;i--){
    const t = traps[i];
    const screenZ = worldOffset-t.wOff;
    t.mesh.position.z=screenZ; t.glow.position.z=screenZ;
    if(t.glow.material) t.glow.material.opacity = 0.12+0.08*Math.sin(Date.now()*0.005);
    if(worldOffset > t.wOff+20){ scene.remove(t.mesh);scene.remove(t.glow);traps.splice(i,1);continue; }
    if(t.destroyed) continue;
    if(Math.abs(screenZ)>12) continue;
    // ↓新增：旋刃横扫免伤——跳过陷阱伤害
    if(atkState.spin.shield) continue;
    // ↓新增：无敌状态跳过陷阱伤害
    if(invincibleActive) continue;
    for(let j=pBalls.length-1;j>=0;j--){
      const pb=pBalls[j];
      const px=pb.mesh.position.x, pz=pb.mesh.position.z, py=pb.mesh.position.y;
      const r=radius(pb.lvl);
      if(t.type==='bar'){
        const inX=Math.abs(px-t.xOff)<t.barW/2+r;
        const inZ=Math.abs(pz-screenZ)<0.3+r*0.6;
        const hitY=py-r<t.barH-0.5+0.3;
        if(inX&&inZ&&hitY){
          emit(pb.mesh.position,LEVELS[pb.lvl-1].h,30,'break');
          scene.remove(pb.mesh);pBalls.splice(j,1);refreshLead();updateFusionHUD();
          t.destroyed=true;emit(t.mesh.position,'#ff4400',25,'break');
          scene.remove(t.mesh);scene.remove(t.glow);traps.splice(i,1);doShake(0.35,0.35);break;
        }
      } else {
        const inX=Math.abs(px-t.xOff)<t.pitW/2;
        const inZ=Math.abs(pz-screenZ)<2.5;
        const onGround=py-r<0.4;
        if(inX&&inZ&&onGround){
          emit(pb.mesh.position,LEVELS[pb.lvl-1].h,25,'break');
          scene.remove(pb.mesh);pBalls.splice(j,1);refreshLead();updateFusionHUD();
          if(pBalls.length===0) addPlayerBall(1);doShake(0.3,0.25);break;
        }
      }
    }
  }
  // 跑酷陷阱作为中后期压力点出现，保留读秒感和反应距离。
  const stg = getCurrentStage();
  const pressure = Math.max(0, CFG.obstacleMul || 0);
  if(stg.stage < 4 || pressure < 0.65 || stageState.cleared) return;
  const speedRatio = clamp01(gs.currentSpeedPS / Math.max(1, CFG.maxSpeedPS));
  const trapSpacing = Math.max(92, (150 - speedRatio * 28) / Math.sqrt(Math.max(1, pressure)));
  if(gs.distance > 150 && gs.distance > lastTrapDist + trapSpacing){
    const type = Math.random()<0.6?'bar':'pit';
    spawnTrap(type);
    lastTrapDist = gs.distance;
  }
}

// ================================================================
//  高架桥梁障碍系统 ↓修改：升级为多层结构+主题色+节拍联动
// ================================================================
const bridges = [];
let lastBridgeDist = 0;

function spawnBridge(){
  const bridgeWOff = worldOffset + 75 + Math.random()*25;
  const screenZ = worldOffset - bridgeWOff;
  const cp = getCurrentChunkProps();
  const themeIdx = cp.themeIdx;
  const tc = CFG.themeColors[themeIdx];

  const w = cp.width * CFG.bridgeWidthRatio;
  const deckH = CFG.bridgeThickness;
  const deckD = CFG.bridgeDepth;
  const bridgeY = CFG.bridgeHeight;

  // ↓修改：桥梁层数随机1~2层
  const layers = gs.phase >= 3 ? (Math.random() > 0.6 ? 2 : 1) : 1;

  const group = new THREE.Group();
  group.position.set(0, 0, screenZ);
  scene.add(group);

  const layerData = [];

  for(let layer=0;layer<layers;layer++){
    const layerY = bridgeY + layer * (bridgeY + deckH + 1);
    const layerW = w * (1 - layer*0.15);  // 上层稍窄

    // 桥面
    const deckMat = new THREE.MeshStandardMaterial({
      color:tc.ground, emissive:tc.neon, emissiveIntensity:1.5,
      roughness:0.2, metalness:0.8, transparent:true, opacity:0.75,
    });
    const deck = new THREE.Mesh(new THREE.BoxGeometry(layerW,deckH,deckD),deckMat);
    deck.position.set(0, layerY+deckH/2, 0); deck.castShadow=true; group.add(deck);

    // 网格线框
    const gridMat = new THREE.MeshBasicMaterial({
      color:tc.neon, transparent:true, opacity:0.3, wireframe:true,
    });
    const deckGrid = new THREE.Mesh(new THREE.BoxGeometry(layerW+0.1,deckH+0.1,deckD+0.1),gridMat);
    deckGrid.position.copy(deck.position); group.add(deckGrid);

    // 边缘光带
    const edgeGeo = new THREE.BoxGeometry(0.3,1.2,deckD);
    const edgeMatL = new THREE.MeshStandardMaterial({
      color:tc.neon, emissive:tc.neon, emissiveIntensity:3.0,
      roughness:0,metalness:1,transparent:true,opacity:0.8,
    });
    const edgeL = new THREE.Mesh(edgeGeo,edgeMatL);
    edgeL.position.set(-layerW/2,layerY+0.6,0); group.add(edgeL);
    const edgeR = new THREE.Mesh(edgeGeo,edgeMatL.clone());
    edgeR.position.set(layerW/2,layerY+0.6,0); group.add(edgeR);

    // 柱子
    const pillarW = CFG.pillarWidth;
    const pillarH = layerY;
    const pillarD = deckD;
    const pillarOffsetX = layerW/2 - pillarW/2 - 1;

    const pillarMat = new THREE.MeshStandardMaterial({
      color:0xff2200,emissive:0xff4400,emissiveIntensity:1.8,roughness:0.3,metalness:0.7,
    });
    const pillarL = new THREE.Mesh(new THREE.BoxGeometry(pillarW,pillarH,pillarD),pillarMat);
    pillarL.position.set(-pillarOffsetX,pillarH/2-0.5,0); pillarL.castShadow=true; group.add(pillarL);
    const pillarR = new THREE.Mesh(new THREE.BoxGeometry(pillarW,pillarH,pillarD),pillarMat);
    pillarR.position.set(pillarOffsetX,pillarH/2-0.5,0); pillarR.castShadow=true; group.add(pillarR);

    // 柱子底部发光
    const pGlowMat = new THREE.MeshBasicMaterial({color:0xff3300,transparent:true,opacity:0.25});
    const pGlowL = new THREE.Mesh(new THREE.PlaneGeometry(pillarW+2,pillarD+2),pGlowMat);
    pGlowL.rotation.x=-Math.PI/2; pGlowL.position.set(-pillarOffsetX,-0.44,0); group.add(pGlowL);
    const pGlowR = new THREE.Mesh(new THREE.PlaneGeometry(pillarW+2,pillarD+2),pGlowMat.clone());
    pGlowR.rotation.x=-Math.PI/2; pGlowR.position.set(pillarOffsetX,-0.44,0); group.add(pGlowR);

    layerData.push({
      deck, deckGrid, edgeL, edgeR, pillarL, pillarR, pGlowL, pGlowR,
      layerW, layerY, pillarW, pillarH, pillarOffsetX,
    });
  }

  bridges.push({
    group, layers: layerData,
    wOff: bridgeWOff,
    deckH, deckD,
    layerCount: layers,
    destroyed: false,
    rotAngle: 0,
    themeIdx,
  });
}

function updateBridges(dt){
  for(let i=bridges.length-1;i>=0;i--){
    const b = bridges[i];
    const screenZ = worldOffset - b.wOff;
    b.group.position.z = screenZ;

    // 旋转同步
    const ci = Math.floor(b.wOff / CFG.chunkLen);
    const phase = ci * 0.8;
    const rotSpeed = CFG.rotateBaseSpeed + (gs.currentSpeedPS/5)*CFG.rotateSpeedK;
    const angle = Math.sin(gs.gameTime*rotSpeed+phase)*CFG.rotateMaxAngle;
    const distFromBall = Math.abs(screenZ);
    const atten = Math.max(0,1-distFromBall/200);
    b.rotAngle = angle*atten;
    b.group.rotation.z = b.rotAngle;
    // ↓新增：桥梁也跟随S弯弯曲
    const props = getChunkProps(ci);
    b.group.rotation.y += (props.bendAngle*0.5 - b.group.rotation.y)*0.08;

    // 脉冲动画
    b.layers.forEach(layer=>{
      if(layer.pGlowL.material){
        const pulse = 0.18+0.1*Math.sin(Date.now()*0.004);
        layer.pGlowL.material.opacity = pulse;
        layer.pGlowR.material.opacity = pulse;
      }
      if(layer.edgeL.material){
        const ep = 2.5+1.0*Math.sin(Date.now()*0.003);
        layer.edgeL.material.emissiveIntensity = ep;
        layer.edgeR.material.emissiveIntensity = ep;
      }
    });

    // 回收
    if(worldOffset > b.wOff+25){ scene.remove(b.group); bridges.splice(i,1); continue; }
    if(b.destroyed) continue;
    if(Math.abs(screenZ)>12) continue;

    // 碰撞检测
    // ↓新增：旋刃横扫免伤——跳过桥梁柱子伤害
    if(atkState.spin.shield) continue;
    // ↓新增：无敌状态跳过桥梁伤害
    if(invincibleActive) continue;
    const cosA = Math.cos(b.rotAngle);
    for(let j=pBalls.length-1;j>=0;j--){
      const pb=pBalls[j];
      const px=pb.mesh.position.x, pz=pb.mesh.position.z, py=pb.mesh.position.y;
      const r=radius(pb.lvl);
      const localX = px*cosA;

      for(const layer of b.layers){
        const inZ = Math.abs(pz-screenZ)<b.deckD/2+r*0.6;
        const belowDeck = py-r<layer.layerY;

        if(inZ && belowDeck){
          const inPLX = Math.abs(localX-(-layer.pillarOffsetX))<layer.pillarW/2+r;
          const inPRX = Math.abs(localX-layer.pillarOffsetX)<layer.pillarW/2+r;
          if(inPLX||inPRX){
            emit(pb.mesh.position,LEVELS[pb.lvl-1].h,30,'break');
            scene.remove(pb.mesh);pBalls.splice(j,1);refreshLead();updateFusionHUD();
            b.destroyed=true;doShake(0.4,0.4);break;
          }
        }

        // 桥面着陆
        const onDeckX = Math.abs(localX)<layer.layerW/2+r;
        const deckTopY = layer.layerY+b.deckH;
        const nearDeck = Math.abs(py-r-deckTopY)<1.0;
        if(onDeckX&&inZ&&nearDeck&&py>layer.layerY){
          pb.mesh.position.y = deckTopY+r;
          if(pb===getLeadBall()){physics.velY=0;physics.onGround=true;}
          pb.vy=0;pb.onGround=true;
        }
      }
      if(b.destroyed) break;
    }
  }

  // 桥梁属于高阶空间压力，避免早期关卡和低密度关卡突然出现。
  const stg = getCurrentStage();
  if(stg.stage >= 5 && CFG.obstacleMul >= 0.9 && gs.phase>=2 && !stageState.cleared){
    const bridgeSpacing = Math.max(130, CFG.bridgeSpacing + Math.max(0,34-gs.currentSpeedPS*1.1));
    if(gs.distance>150 && gs.distance>lastBridgeDist+bridgeSpacing){
      spawnBridge();
      lastBridgeDist = gs.distance;
    }
  }
}

//  磁力道具系统 ↓新增
// ================================================================
const magnetItems = [];       // 场景中的磁力道具
let magnetActive = false;     // 磁力是否激活
let magnetTimer = 0;          // 磁力剩余时间
const MAGNET_DURATION = 8;    // 磁力持续秒数
const MAGNET_PULL_SPEED = 35; // 吸附速度
const MAGNET_RANGE = 40;      // 吸附范围
let lastMagnetDist = 100;     // 上次生成距离
const MAGNET_SPACING = 150;   // 道具生成间距

function spawnMagnetItem(){
  const wOff = worldOffset + 70 + Math.random() * 20;
  const screenZ = worldOffset - wOff;
  const cp = getCurrentChunkProps();
  const hw = cp.width / 2;
  const xPos = (Math.random() - 0.5) * (hw * 1.0);

  // 磁铁悬浮高度——必须跳跃才能捡到
  const hoverY = 3.2 + Math.random() * 1.5; // 3.2~4.7 高度

  const group = new THREE.Group();
  group.position.set(xPos, hoverY, screenZ);

  // 磁铁主体——U形磁铁
  const magnetRed = new THREE.MeshStandardMaterial({ color:0xff0033, emissive:0xff0033, emissiveIntensity:0.8, roughness:0.2, metalness:0.8 });
  const magnetBlue = new THREE.MeshStandardMaterial({ color:0x0066ff, emissive:0x0066ff, emissiveIntensity:0.8, roughness:0.2, metalness:0.8 });
  const magnetBody = new THREE.MeshStandardMaterial({ color:0x888899, emissive:0x4444ff, emissiveIntensity:0.3, roughness:0.3, metalness:0.9 });

  // 左臂（红色）
  const armGeo = new THREE.BoxGeometry(0.8, 1.6, 0.8);
  const leftArm = new THREE.Mesh(armGeo, magnetRed);
  leftArm.position.set(-1.0, 0, 0);
  group.add(leftArm);
  // 右臂（蓝色）
  const rightArm = new THREE.Mesh(armGeo, magnetBlue);
  rightArm.position.set(1.0, 0, 0);
  group.add(rightArm);
  // 顶部连接（灰色金属）
  const topBar = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.8, 0.8), magnetBody);
  topBar.position.set(0, 0.8, 0);
  group.add(topBar);

  // 环绕光圈
  const ringGeo = new THREE.TorusGeometry(2.0, 0.12, 8, 32);
  const ringMat = new THREE.MeshBasicMaterial({ color:0x00ccff, transparent:true, opacity:0.5 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  group.add(ring);

  // 下方光柱（提示需要跳跃）
  const beamGeo = new THREE.CylinderGeometry(0.3, 1.5, hoverY, 8, 1, true);
  const beamMat = new THREE.MeshBasicMaterial({ color:0x00ccff, transparent:true, opacity:0.12, side:THREE.DoubleSide });
  const beam = new THREE.Mesh(beamGeo, beamMat);
  beam.position.y = -hoverY / 2;
  group.add(beam);

  // 地面标记圈
  const markerGeo = new THREE.RingGeometry(1.5, 2.0, 16);
  const markerMat = new THREE.MeshBasicMaterial({ color:0x00ccff, transparent:true, opacity:0.3, side:THREE.DoubleSide });
  const marker = new THREE.Mesh(markerGeo, markerMat);
  marker.rotation.x = -Math.PI / 2;
  marker.position.set(0, -hoverY + 0.1, 0);
  group.add(marker);

  // 点光源
  const glow = new THREE.PointLight(0x00ccff, 3, 12);
  glow.position.set(0, 0, 0);
  group.add(glow);

  scene.add(group);

  magnetItems.push({
    group, ring, beam, marker, glow,
    wOff, hoverY, xPos,
    collected: false,
  });
}

function updateMagnetItems(dt){
  // 生成
  if(gs.distance > lastMagnetDist + MAGNET_SPACING){
    spawnMagnetItem();
    lastMagnetDist = gs.distance;
  }

  const lead = getLeadBall();
  const leadPos = lead ? lead.mesh.position : null;

  for(let i = magnetItems.length - 1; i >= 0; i--){
    const m = magnetItems[i];
    const screenZ = worldOffset - m.wOff;
    m.group.position.z = screenZ;

    // 旋转动画
    m.ring.rotation.x += dt * 1.2;
    m.ring.rotation.y += dt * 0.8;
    // 上下浮动
    const bobY = Math.sin(Date.now() * 0.003 + i) * 0.3;
    m.group.position.y = m.hoverY + bobY;
    // 光柱闪烁
    if(m.beam.material) m.beam.material.opacity = 0.08 + Math.sin(Date.now() * 0.005) * 0.06;
    // 地面标记脉冲
    if(m.marker.material) m.marker.material.opacity = 0.2 + Math.sin(Date.now() * 0.004) * 0.15;

    // 拾取检测：球必须在空中（不在地面）且接近道具
    if(!m.collected && leadPos){
      const dist = leadPos.distanceTo(m.group.position);
      if(dist < 3.5 && !physics.onGround){
        m.collected = true;
        // 激活磁力
        magnetActive = true;
        magnetTimer = MAGNET_DURATION;
        // 视觉反馈
        emit(m.group.position, '#00ccff', 50, 'fusion');
        doShake(0.2, 0.2);
        scene.remove(m.group);
        magnetItems.splice(i, 1);
        showAtkMsg('🧲 磁力吸附!', '#00ccff');
        continue;
      }
    }

    // 回收
    if(worldOffset > m.wOff + 30){
      scene.remove(m.group);
      magnetItems.splice(i, 1);
    }
  }

  // 磁力持续时间
  if(magnetActive){
    magnetTimer -= dt;
    if(magnetTimer <= 0){
      magnetActive = false;
      magnetTimer = 0;
    } else {
      // 吸附效果：把范围内的可合成球拉向主角
      if(leadPos){
        for(const rb of roadBalls){
          if(rb.collected) continue;
          const dist = leadPos.distanceTo(rb.mesh.position);
          if(dist < MAGNET_RANGE){
            // 根据距离计算吸附力度——越近越强
            const pullStrength = 1 - dist / MAGNET_RANGE;
            const pullDir = new THREE.Vector3().subVectors(leadPos, rb.mesh.position).normalize();
            rb.mesh.position.add(pullDir.multiplyScalar(MAGNET_PULL_SPEED * pullStrength * dt));
            rb.glow.position.x = rb.mesh.position.x;
            rb.glow.position.z = rb.mesh.position.z;
            // 被吸附的球发光
            if(rb.mesh.material && !rb.mesh.userData._magnetGlow){
              rb.mesh.userData._magnetGlow = true;
              rb.mesh.material.emissiveIntensity = 2.0;
            }
          }
        }
      }
    }
  }
}

function spawnInvincibleItem(){

function updateInvincibleItems(dt){
  const stg = getCurrentStage();
  if(!stg.hasInvincible) return;

  // 生成
  const spacing = stg.invincibleSpacing || 200;
  if(gs.distance > lastInvincibleDist + spacing && !stageState.cleared){
    spawnInvincibleItem();
    lastInvincibleDist = gs.distance;
  }

  const lead = getLeadBall();
  const leadPos = lead ? lead.mesh.position : null;

  for(let i = invincibleItems.length - 1; i >= 0; i--){
    const m = invincibleItems[i];
    const screenZ = worldOffset - m.wOff;
    m.group.position.z = screenZ;

    // 动画
    m.outerRing.rotation.x += dt * 1.5;
    m.outerRing.rotation.z += dt * 0.7;
    m.outerRing2.rotation.y += dt * 1.0;
    m.outerRing2.rotation.z += dt * 0.8;
    const bobY = Math.sin(Date.now() * 0.003 + i * 1.3) * 0.28;
    m.group.position.y = m.hoverY + bobY;
    if(m.beam.material) m.beam.material.opacity = 0.07 + Math.sin(Date.now()*0.006)*0.06;
    if(m.marker.material) m.marker.material.opacity = 0.18 + Math.sin(Date.now()*0.004)*0.15;

    // 拾取检测（地面或空中均可拾取，范围更大）
    if(!m.collected && leadPos){
      const dist = leadPos.distanceTo(m.group.position);
      if(dist < 4.0){
        m.collected = true;
        invincibleActive = true;
        invincibleTimer = INVINCIBLE_DURATION;
        emit(m.group.position, '#FFD700', 60, 'fusion');
        doShake(0.25, 0.25);
        scene.remove(m.group);
        invincibleItems.splice(i, 1);
        showAtkMsg('⭐ 无敌状态!', '#FFD700');
        screenFlash.active = true; screenFlash.t0 = Date.now();
        screenFlash.dur = 0.35; screenFlash.color = 'rgba(255,220,50,0.3)';
        continue;
      }
    }

    if(worldOffset > m.wOff + 30){ scene.remove(m.group); invincibleItems.splice(i, 1); }
  }

  // 无敌计时
  if(invincibleActive){
    invincibleTimer -= dt;
    if(invincibleTimer <= 0){ invincibleActive = false; invincibleTimer = 0; }
  }
}

// ── 球体材质 ──
const matCache = {};
function getBallMat(lvl){
  if(!matCache[lvl]){
    const cfg = LEVELS[lvl-1];
    matCache[lvl] = new THREE.MeshStandardMaterial({
      color:cfg.c, emissive:cfg.e, emissiveIntensity:0.55,
      roughness:0.1, metalness:0.9,
    });
  }
  return matCache[lvl];
}
function makeBallMesh(lvl){
  const r = radius(lvl);
  const m = new THREE.Mesh(new THREE.SphereGeometry(r,32,32), getBallMat(lvl));
  m.castShadow = true;
  const ringGeo = new THREE.TorusGeometry(r*1.35, 0.05, 8, 32);
  const ringMat = new THREE.MeshStandardMaterial({
    color:LEVELS[lvl-1].c, emissive:LEVELS[lvl-1].c,
    emissiveIntensity:2.5, transparent:true, opacity:0.7
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI/2;
  m.add(ring);
  m.userData.ring = ring;
  return m;
}

const gs = {
  distance: 0, score: 0, gameTime: 0,
  currentSpeedPS: 0, phase: 1,
};

const PHY = {
  gravity:18, bounceDamp:0.35, ballPush:180, ballSpring:0.0,
  wallFriction:0.4, formDrag:12, formDist:3.5,
};

const physics = { velX:0, velY:0, onGround:true };
const ctl = { forward:false, backward:false, left:false, right:false, jump:false, shoot:false, boost:false };

function getAutoSpeedPS(t){
  const range = CFG.maxSpeedPS - CFG.initSpeedPS;
  const launchPush = 1 - Math.exp(-0.55 * t);
  const cruiseCurve = 1 - Math.exp(-CFG.speedRiseK * t);
  const speedBlend = Math.min(0.96, launchPush * 0.28 + cruiseCurve * 0.72);
  return CFG.initSpeedPS + range * speedBlend;
}

function approachValue(current, target, k, dt){
  return current + (target - current) * (1 - Math.exp(-k * dt));
}

function clamp01(v){
  return Math.max(0, Math.min(1, v));
}

const pBalls = [];
let leadIdx = 0;

function addPlayerBall(lvl){
  const mesh = makeBallMesh(lvl);
  const lead = pBalls.length > 0 ? pBalls[leadIdx] : null;
  const px = lead ? lead.mesh.position.x + (Math.random()-0.5)*3 : 0;
  const pz = lead ? lead.mesh.position.z + (Math.random()-0.5)*2 : 0;
  mesh.position.set(px, radius(lvl) - 0.5, pz);
  scene.add(mesh);
  const b = { lvl, mesh, tgt:new THREE.Vector3(), vx:0, vy:0, vz:0, onGround:true, pinned:false };
  pBalls.push(b);
  refreshLead();
  return b;
}

function refreshLead(){
  if(!pBalls.length){ leadIdx=0; return; }
  let mx=0, mi=0;
  pBalls.forEach((b,i)=>{ if(b.lvl>mx){ mx=b.lvl; mi=i; } });
  leadIdx = mi;
}

function getLeadBall(){ return pBalls[leadIdx] || null; }
function getLeadPos(){ return getLeadBall()?.mesh.position ?? new THREE.Vector3(0,1,0); }

function updateFormationTargets(leadPos){
  if(!pBalls.length) return;
  pBalls[leadIdx].tgt.set(leadPos.x, radius(pBalls[leadIdx].lvl)-0.5, 0);
  let L=1, R=1;
  for(let i=0;i<pBalls.length;i++){
    if(i===leadIdx) continue;
    const r = radius(pBalls[i].lvl);
    const sp = PHY.formDist + r;
    if(L<=R){ pBalls[i].tgt.set(leadPos.x-L*sp,r-0.5,L*sp*0.8); L++; }
    else { pBalls[i].tgt.set(leadPos.x+R*sp,r-0.5,R*sp*0.8); R++; }
  }
}

// ── 球体物理更新 ↓修改：适配动态轨道宽度/弯曲/起伏/倾斜 ──
function updateBallPhysics(dt){
  if(!pBalls.length) return;
  const lead = pBalls[leadIdx];
  const cp = getCurrentChunkProps();  // ↓新增：获取当前chunk属性
  const hw = cp.width / 2;

  // 1. 阵型回中力
  for(let i=0;i<pBalls.length;i++){
    const b=pBalls[i];
    if(i===leadIdx) continue;
    const dx=b.tgt.x-b.mesh.position.x;
    const dz=b.tgt.z-b.mesh.position.z;
    b.vx+=dx*PHY.formDrag*dt;
    b.vz+=dz*PHY.formDrag*dt;
  }

  // 2. 球间碰撞
  for(let i=0;i<pBalls.length;i++){
    for(let j=i+1;j<pBalls.length;j++){
      const a=pBalls[i],b=pBalls[j];
      const ra=radius(a.lvl),rb=radius(b.lvl);
      const minDist=ra+rb;
      const dx=b.mesh.position.x-a.mesh.position.x;
      const dz=b.mesh.position.z-a.mesh.position.z;
      const dist=Math.sqrt(dx*dx+dz*dz);
      if(dist<minDist&&dist>0.01){
        const overlap=minDist-dist;
        const nx=dx/dist,nz=dz/dist;
        const pushForce=PHY.ballPush*overlap;
        const aMass=(i===leadIdx)?3.0:1.0;
        const bMass=(j===leadIdx)?3.0:1.0;
        const totalMass=aMass+bMass;
        a.vx-=nx*pushForce*(bMass/totalMass)*dt;
        a.vz-=nz*pushForce*(bMass/totalMass)*dt;
        b.vx+=nx*pushForce*(aMass/totalMass)*dt;
        b.vz+=nz*pushForce*(aMass/totalMass)*dt;
        const corrA=overlap*(bMass/totalMass)*0.6;
        const corrB=overlap*(aMass/totalMass)*0.6;
        a.mesh.position.x-=nx*corrA;
        a.mesh.position.z-=nz*corrA;
        b.mesh.position.x+=nx*corrB;
        b.mesh.position.z+=nz*corrB;
      }
    }
  }

  // 3. 护栏碰撞 ↓修改：适配动态宽度+旋转+起伏
  for(let i=0;i<pBalls.length;i++){
    const b=pBalls[i];
    const r=radius(b.lvl);
    // ↓新增：有效半宽考虑旋转和当前chunk宽度
    const effectiveHW = (cp.width/2)*Math.cos(cp.tiltAngle) - r - 0.3;
    const leftWall = -effectiveHW;
    const rightWall = effectiveHW;

    if(b.mesh.position.x < leftWall){
      b.mesh.position.x = leftWall;
      if(b.vx<0){ b.vx*=-PHY.bounceDamp; b.vx=Math.max(b.vx,0); }
      b.vz*=(1-PHY.wallFriction*dt*10);
      b.pinned=true;
    } else if(b.mesh.position.x > rightWall){
      b.mesh.position.x = rightWall;
      if(b.vx>0){ b.vx*=-PHY.bounceDamp; b.vx=Math.min(b.vx,0); }
      b.vz*=(1-PHY.wallFriction*dt*10);
      b.pinned=true;
    } else {
      b.pinned=false;
    }

    // ↓新增：弯曲产生的横向推力（球在弯道上被推向外侧）
    if(gs.phase >= 2 && Math.abs(cp.bendAngle) > 0.01){
      const centrifugal = cp.bendAngle * gs.currentSpeedPS * 0.3;
      b.vx += centrifugal * dt;
    }

    // ↓新增：起伏产生的纵向力（上坡减速、下坡加速）
    // 通过调整ball的Y来适配起伏地形
    const groundY = radius(b.lvl) - 0.5 + cp.elevation;
    if(b.mesh.position.y <= groundY && b.onGround){
      b.mesh.position.y = groundY;
    }
  }

  // 4. 应用速度到位置+阻尼
  for(let i=0;i<pBalls.length;i++){
    const b=pBalls[i];
    if(i===leadIdx) continue;
    b.mesh.position.x+=b.vx*dt;
    b.mesh.position.z+=b.vz*dt;
    if(!b.onGround){ b.vy-=PHY.gravity*dt; b.mesh.position.y+=b.vy*dt; }
    const groundY=radius(b.lvl)-0.5;
    if(b.mesh.position.y<=groundY){ b.mesh.position.y=groundY; b.vy=0; b.onGround=true; }
    b.vx*=Math.pow(0.02,dt);
    b.vz*=Math.pow(0.05,dt);
    b.mesh.rotation.x-=(0.04+Math.abs(b.vx)*0.01);
    b.mesh.rotation.z-=b.vx*dt*0.5;
    if(b._sa){
      const s=b.mesh.scale.x;
      const ns=s+(b._sa.t-s)*0.14;
      b.mesh.scale.set(ns,ns,ns);
      if(Math.abs(ns-b._sa.t)<0.01){b.mesh.scale.set(1,1,1);delete b._sa;}
    }
  }
}

const roadBalls = [];
const blackBalls = [];
let lastRbDist = -CFG.roadBallInterval;
let lastObsDist = 0;

function maxLvl(){ return pBalls.length ? Math.max(...pBalls.map(b=>b.lvl)) : 1; }

function getInitialRoadBallCount(){
  const stg = getCurrentStage();
  if(!stg) return 1;
  if(stg.stage <= 1) return 1;
  return 1;
}

function spawnRoadBall(){
  const ml=maxLvl();
  const rnd=Math.random();
  const lvl=rnd<0.10?ml:rnd<0.60?Math.max(1,ml-1):Math.max(1,ml-2);
  const side=Math.random()>0.5?1:-1;
  const cp = getCurrentChunkProps();
  const xRange=cp.width/2-3;
  const xPos=side*(xRange*(0.4+Math.random()*0.5));
  const objWOff=worldOffset+65+Math.random()*25;
  const screenZ=worldOffset-objWOff;
  const mesh=makeBallMesh(lvl);
  mesh.position.set(xPos,radius(lvl),screenZ);
  const glowGeo=new THREE.CircleGeometry(radius(lvl)*1.8,16);
  const glowMat=new THREE.MeshBasicMaterial({color:LEVELS[lvl-1].c,transparent:true,opacity:0.18});
  const glow=new THREE.Mesh(glowGeo,glowMat);
  glow.rotation.x=-Math.PI/2; glow.position.set(xPos,-0.48,screenZ);
  scene.add(mesh);scene.add(glow);
  roadBalls.push({lvl,mesh,glow,collected:false,wOff:objWOff});
}

function spawnBlackBall(){
  // 关卡限制：检查当前关卡是否允许黑铁球，以及在场数量
  const stg = getCurrentStage();
  if(stg.maxBlackBalls <= 0) return;
  const aliveBlackBalls = blackBalls.filter(b => !b.destroyed).length;
  if(aliveBlackBalls >= stg.maxBlackBalls) return;

  const cp = getCurrentChunkProps();
  const xPos=(Math.random()-0.5)*(cp.width-6);
  const objWOff=worldOffset+75+Math.random()*15;
  const screenZ=worldOffset-objWOff;

  // ↓修改：根据游戏阶段选择怪物类型
  let typeIdx = 0; // 默认普通黑铁球
  if(gs.phase >= 2){
    const roll = Math.random();
    if(roll < 0.15) typeIdx = 4;      // 泰坦壳（rare）
    else if(roll < 0.35) typeIdx = 3;  // 雷暴核
    else if(roll < 0.55) typeIdx = 2;  // 寒冰晶
    else if(roll < 0.75) typeIdx = 1;  // 烈焰魔
    // else 普通黑铁球
  }

  const et = CFG.enemyTypes[typeIdx];
  const mat=new THREE.MeshStandardMaterial({color:et.color,emissive:et.emissive,emissiveIntensity:1.5,roughness:0.2,metalness:0.9});
  const mesh=new THREE.Mesh(new THREE.SphereGeometry(et.radius,32,32),mat);
  mesh.position.set(xPos,et.radius,screenZ);mesh.castShadow=true;

  // 属性标识环
  const rRing=new THREE.Mesh(new THREE.TorusGeometry(et.radius*1.5,0.12,8,32),new THREE.MeshStandardMaterial({color:et.ring,emissive:et.ring,emissiveIntensity:3}));
  rRing.rotation.x=Math.PI/2;mesh.add(rRing);

  // ↓新增：属性怪物额外视觉 — 第二环（属性标识）
  if(typeIdx > 0){
    const rRing2=new THREE.Mesh(new THREE.TorusGeometry(et.radius*1.2,0.08,8,32),new THREE.MeshStandardMaterial({color:et.ring,emissive:et.ring,emissiveIntensity:5,transparent:true,opacity:0.6}));
    rRing2.rotation.x=Math.PI/2;rRing2.rotation.y=Math.PI/4;mesh.add(rRing2);
    // 护盾光晕（属性怪有护盾）
    const shieldGeo = new THREE.SphereGeometry(et.radius*1.6, 16, 16);
    const shieldMat = new THREE.MeshBasicMaterial({color:et.ring,transparent:true,opacity:0.12,wireframe:true});
    const shieldMesh = new THREE.Mesh(shieldGeo, shieldMat);
    mesh.add(shieldMesh);
  }

  const glow=new THREE.Mesh(new THREE.CircleGeometry(et.radius*2,16),new THREE.MeshBasicMaterial({color:et.glowColor,transparent:true,opacity:0.15}));
  glow.rotation.x=-Math.PI/2;glow.position.set(xPos,-0.45,screenZ);
  scene.add(mesh);scene.add(glow);
  blackBalls.push({mesh,glow,destroyed:false,wOff:objWOff,enemyType:typeIdx,hp:et.hp,maxHp:et.hp,shield:typeIdx>0});
}

function updateRoad(){
  for(let i=roadBalls.length-1;i>=0;i--){
    const rb=roadBalls[i];
    const screenZ=worldOffset-rb.wOff;
    if(!rb.mesh.userData.flyTo){rb.mesh.position.z=screenZ;rb.glow.position.z=screenZ;}
    rb.mesh.rotation.y+=0.025;
    if(rb.mesh.userData.ring)rb.mesh.userData.ring.rotation.z+=0.035;
    if(!rb.collected){rb.mesh.position.y=radius(rb.lvl)+Math.sin(Date.now()*0.003+rb.mesh.position.x)*0.18;}
    if(worldOffset>rb.wOff+20){scene.remove(rb.mesh);scene.remove(rb.glow);roadBalls.splice(i,1);}
  }
  for(let i=blackBalls.length-1;i>=0;i--){
    const ob=blackBalls[i];
    const et = CFG.enemyTypes[ob.enemyType || 0];
    ob.mesh.position.z=worldOffset-ob.wOff;
    ob.glow.position.z=worldOffset-ob.wOff;
    ob.mesh.rotation.y+=0.02;
    // ↓新增：属性怪物脉冲动画
    if(ob.enemyType > 0 && !ob.destroyed){
      const pulse = 1 + Math.sin(Date.now()*0.005 + i) * 0.08;
      ob.mesh.scale.setScalar(pulse);
      // 护盾环旋转
      ob.mesh.children.forEach(child => {
        if(child.type === 'Mesh') child.rotation.z += 0.03;
      });
    }
    if(worldOffset>ob.wOff+20){scene.remove(ob.mesh);scene.remove(ob.glow);blackBalls.splice(i,1);}
  }
  const stg = getCurrentStage();
  const speedRatio = clamp01(gs.currentSpeedPS / Math.max(1, CFG.maxSpeedPS));
  const rbCatchup = speedRatio > 0.72 ? 0.88 : 1.0;
  if(gs.distance-lastRbDist>CFG.roadBallInterval*rbCatchup){
    spawnRoadBall();
    const extraChance = stg.stage <= 1 ? 0.02 : (stg.stage === 2 ? 0.06 : (speedRatio > 0.68 ? 0.12 : 0.08));
    if(Math.random() < extraChance) spawnRoadBall();
    lastRbDist=gs.distance;
  }
  const pressure=Math.max(0, CFG.obstacleMul||0);
  const baseDynSpacing=CFG.obstacleSpacing + (1-speedRatio)*42;
  const dynSpacing=Math.max(CFG.obstacleMinSpacing, baseDynSpacing / Math.sqrt(Math.max(1, pressure)));
  if(gs.distance>CFG.obstacleStartDist&&gs.distance>lastObsDist+dynSpacing){spawnBlackBall();lastObsDist=gs.distance;}
}

const pts = [];
function emit(pos, color, cnt, type='hit'){
  for(let i=0;i<cnt;i++){
    const a=Math.random()*Math.PI*2, e=(Math.random()-0.5)*Math.PI;
    const sp=type==='fusion'?2+Math.random()*5:0.6+Math.random()*2.5;
    pts.push({
      x:pos.x,y:pos.y,z:pos.z,
      vx:Math.cos(a)*Math.cos(e)*sp,vy:Math.abs(Math.sin(e))*sp+0.5,vz:Math.sin(a)*Math.cos(e)*sp,
      life:1,ml:type==='fusion'?0.9+Math.random()*0.4:0.5+Math.random()*0.3,
      r:type==='fusion'?0.14+Math.random()*0.18:0.06+Math.random()*0.1,
      color, type
    });
  }
}

function rgbFromHex(hex){
  return [(hex>>16)&255, (hex>>8)&255, hex&255];
}

function drawSpeedFX(){
  if(gs.distance <= 0 && !pBalls.length) return;
  const w=cvs2.width, h=cvs2.height;
  const speedRatio=clamp01(gs.currentSpeedPS / Math.max(1, CFG.maxSpeedPS));
  if(speedRatio < 0.04) return;

  const cp=getCurrentChunkProps();
  const tc=CFG.themeColors[cp.themeIdx] || CFG.themeColors[0];
  const [r,g,b]=rgbFromHex(tc.neon);
  const strength=clamp01((speedRatio - 0.06) / 0.62);
  const intensity=Math.min(1, 0.22 + strength * 0.95);
  const cx=w*0.5, cy=h*0.43;
  const time=gs.gameTime;

  ctx.save();
  ctx.globalCompositeOperation='lighter';

  const vignette=ctx.createRadialGradient(cx,cy,Math.min(w,h)*0.12,cx,cy,Math.max(w,h)*0.72);
  vignette.addColorStop(0,'rgba(0,0,0,0)');
  vignette.addColorStop(0.64,`rgba(${r},${g},${b},${0.035*intensity})`);
  vignette.addColorStop(1,`rgba(${r},${g},${b},${0.16*intensity})`);
  ctx.fillStyle=vignette;
  ctx.fillRect(0,0,w,h);

  ctx.lineCap='round';
  ctx.shadowColor=`rgba(${r},${g},${b},0.8)`;
  ctx.shadowBlur=14*intensity;
  const lineCount=Math.floor(18 + intensity * 38);
  for(let i=0;i<lineCount;i++){
    const seed=(Math.sin(i*12.9898)*43758.5453)%1;
    const rnd=seed<0?seed+1:seed;
    const side=i%2===0?-1:1;
    const lane=(Math.sin(i*7.21+3.4)*0.5+0.5);
    const y=(rnd*h + time*(220 + gs.currentSpeedPS*18)*(0.45+lane))%h;
    const x=side<0 ? w*(0.43-lane*0.38) : w*(0.57+lane*0.38);
    const len=(80 + 260*intensity) * (0.65 + lane*0.55);
    const dy=(y-cy)*0.09 + 26*intensity;
    ctx.strokeStyle=`rgba(${r},${g},${b},${0.05 + 0.16*intensity})`;
    ctx.lineWidth=1 + intensity*2.6;
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.lineTo(x + side*len, y + dy);
    ctx.stroke();
  }

  ctx.shadowBlur=10*intensity;
  const stripeSpeed=0.18 + speedRatio*1.35;
  for(let i=0;i<7;i++){
    const p=(i/7 + time*stripeSpeed)%1;
    const y=h*(0.56 + p*0.48);
    const halfW=w*(0.08 + p*0.44);
    const alpha=(1-p)*(0.08 + 0.16*intensity);
    ctx.strokeStyle=`rgba(${r},${g},${b},${alpha})`;
    ctx.lineWidth=1.5 + p*4*intensity;
    ctx.beginPath();
    ctx.moveTo(cx-halfW,y);
    ctx.lineTo(cx+halfW,y);
    ctx.stroke();
  }

  ctx.restore();
}

function drawParticles(){
  ctx.clearRect(0,0,cvs2.width,cvs2.height);
  drawSpeedFX();
  for(let i=pts.length-1;i>=0;i--){
    const p=pts[i];
    p.x+=p.vx*0.016;p.y+=p.vy*0.016;p.z+=p.vz*0.016;
    p.vy-=0.06;p.life-=0.016/p.ml;
    if(p.life<=0){pts.splice(i,1);continue;}
    const v=new THREE.Vector3(p.x,p.y,p.z);v.project(camera);
    if(v.z>1)continue;
    const sx=(v.x+1)/2*cvs2.width,sy=(-v.y+1)/2*cvs2.height;
    const sz=Math.max(1.5,p.r*90/(Math.abs(camera.position.z-p.z)+15));
    ctx.globalAlpha=Math.max(0,p.life)*0.9;
    if(p.type==='fusion'){ctx.shadowColor=p.color;ctx.shadowBlur=12;}
    else ctx.shadowBlur=0;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(sx,sy,sz,0,Math.PI*2);ctx.fill();
  }
  ctx.shadowBlur=0;ctx.globalAlpha=1;
  drawComboOverlay();
}

function drawComboOverlay(){

const fusAnim = { active:false, balls:[], center:new THREE.Vector3(), t0:0, dur:0.75, onDone:null, tgtLvl:1 };

function startFusAnim(balls, center, tgtLvl, cb){
  fusAnim.active=true;fusAnim.balls=balls.slice();
  fusAnim.center.copy(center);fusAnim.tgtLvl=tgtLvl;
  fusAnim.t0=Date.now();fusAnim.onDone=cb;
  balls.forEach(b=>emit(b.mesh.position,LEVELS[b.lvl-1].h,20,'fusion'));
}

function tickFusAnim(){
  if(!fusAnim.active) return;
  const t=Math.min((Date.now()-fusAnim.t0)/1000/fusAnim.dur,1);
  fusAnim.balls.forEach(b=>{
    if(!b.mesh) return;
    b.mesh.position.lerp(fusAnim.center,0.15+t*0.35);
    const s=1-t*0.9;b.mesh.scale.set(s,s,s);
  });
  if(t>=1){
    fusAnim.active=false;
    if(fusAnim.onDone) fusAnim.onDone();
    emit(fusAnim.center,LEVELS[Math.min(fusAnim.tgtLvl-1,6)].h,90,'fusion');
  }
}

function doFusion(){
  let fCnt=0,changed=true;
  while(changed){
    changed=false;
    const cnt={};
    pBalls.forEach(b=>cnt[b.lvl]=(cnt[b.lvl]||0)+1);
    for(let lvl=1;lvl<=6;lvl++){
      if((cnt[lvl]||0)>=4){
        const idxs=[];
        for(let i=0;i<pBalls.length&&idxs.length<4;i++) if(pBalls[i].lvl===lvl) idxs.push(i);
        const center=new THREE.Vector3();
        idxs.forEach(i=>center.add(pBalls[i].mesh.position));center.divideScalar(4);
        const fBalls=idxs.map(i=>pBalls[i]);
        const nLvl=Math.min(lvl+1,7);
        if(fCnt===0){
          startFusAnim(fBalls,center,nLvl,()=>{
            fBalls.forEach(b=>{const i=pBalls.indexOf(b);if(i>=0){scene.remove(b.mesh);pBalls.splice(i,1);}});
            const nb=addPlayerBall(nLvl);nb.mesh.position.copy(center);nb.mesh.scale.set(0.1,0.1,0.1);nb._sa={t:1};
            refreshLead();updateFusionHUD();
          });
        } else {
          fBalls.forEach(b=>{const i=pBalls.indexOf(b);if(i>=0){scene.remove(b.mesh);pBalls.splice(i,1);}});
          const nb=addPlayerBall(nLvl);nb.mesh.position.copy(center);nb.mesh.scale.set(0.1,0.1,0.1);nb._sa={t:1};
          emit(center,LEVELS[nLvl-1].h,55,'fusion');
        }
        fCnt++;changed=true;break;
      }
    }
  }
  return fCnt;
}
